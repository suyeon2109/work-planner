<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 / 연구일지</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

  :root {
    --bg: #ffffff;
    --sidebar-bg: #f7f6f3;
    --border: #e8e8e5;
    --text: #37352f;
    --text-muted: #9b9a97;
    --text-light: #b7b6b3;
    --accent: #2f80ed;
    --accent-hover: #1a6fd4;
    --tag-bg: #e8f0fe;
    --tag-text: #2f80ed;
    --row-hover: #f7f7f5;
    --danger: #eb5757;
    --success: #0f7b6c;
    --font: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  }

  body {
    font-family: var(--font);
    background: #f7f6f3;
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Layout ── */
  .app-layout {
    display: flex;
    align-items: flex-start;
    min-height: 100vh;
  }

  .main-wrap {
    flex: 1;
    min-width: 0;
    padding: 40px 20px 80px;
  }

  .page {
    max-width: 900px;
    margin: 0 auto;
    background: var(--bg);
    border-radius: 4px;
    padding: 60px 72px;
    box-shadow: rgba(15,15,15,.05) 0px 0px 0px 1px, rgba(15,15,15,.1) 0px 3px 6px;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 240px;
    min-width: 240px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    align-self: flex-start;
    height: 100vh;
    overflow: hidden;
  }

  .sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 14px 10px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .sidebar-add-team {
    border: none;
    background: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 12px;
    font-family: var(--font);
    padding: 3px 7px;
    border-radius: 4px;
    transition: background 0.1s, color 0.1s;
  }
  .sidebar-add-team:hover { background: rgba(0,0,0,0.06); color: var(--text); }

  .sidebar-items {
    flex: 1;
    overflow-y: auto;
    padding: 8px 6px 12px;
  }

  .team-group { margin-bottom: 2px; }

  .team-row {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 6px;
    border-radius: 5px;
    cursor: pointer;
  }
  .team-row:hover { background: rgba(0,0,0,0.06); }
  .team-row:hover .team-action { opacity: 1; }
  .team-chevron {
    width: 13px;
    flex-shrink: 0;
    color: var(--text-muted);
    font-size: 9px;
    display: flex;
    justify-content: center;
    transition: transform 0.15s;
  }
  .team-group.collapsed .team-chevron { transform: rotate(-90deg); }
  .team-dot { width: 6px; height: 6px; border-radius: 2px; background: var(--text-light); flex-shrink: 0; }
  .team-name-input {
    flex: 1;
    min-width: 0;
    border: none;
    background: transparent;
    outline: none;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .team-action {
    border: none;
    background: none;
    cursor: pointer;
    color: var(--text-light);
    font-size: 12px;
    padding: 2px 5px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
  }
  .team-action:hover { color: var(--danger); }

  .member-list { list-style: none; overflow: hidden; }
  .team-group.collapsed .member-list,
  .team-group.collapsed .add-person-btn { display: none; }

  .person-row {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 6px 6px 25px;
    border-radius: 5px;
    cursor: pointer;
  }
  .person-row:hover { background: rgba(0,0,0,0.06); }
  .person-row:hover .person-action { opacity: 1; }
  .person-row.active { background: var(--tag-bg); }
  .person-row.active .person-name-input { color: var(--accent); font-weight: 600; }
  .person-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text-light);
    flex-shrink: 0;
  }
  .person-row.active .person-dot { background: var(--accent); }
  .person-name-input {
    flex: 0 1 auto;
    width: 110px;
    min-width: 0;
    border: none;
    background: transparent;
    outline: none;
    font-family: var(--font);
    font-size: 13px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .person-spacer {
    flex: 1;
    align-self: stretch;
    min-width: 8px;
    cursor: pointer;
  }
  .person-action {
    border: none;
    background: none;
    cursor: pointer;
    color: var(--text-light);
    font-size: 11px;
    padding: 2px 5px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
  }
  .person-action:hover { color: var(--danger); }

  /* 퇴사자 섹션 */
  .retired-section { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px; }
  .retired-section-header {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 6px; cursor: pointer; border-radius: 5px;
  }
  .retired-section-header:hover { background: rgba(0,0,0,0.06); }
  .retired-chevron {
    width: 13px; flex-shrink: 0; color: var(--text-muted); font-size: 9px;
    display: flex; justify-content: center; transition: transform 0.15s;
  }
  .retired-section.collapsed .retired-chevron { transform: rotate(-90deg); }
  .retired-section-label { font-size: 11px; font-weight: 600; color: var(--text-light); letter-spacing: 0.05em; }
  .retired-section.collapsed .retired-member-list { display: none; }
  .retired-member-list { list-style: none; }

  .person-row.retired .person-dot { background: var(--text-light); }
  .person-row.retired .person-name-input { color: var(--text-muted); text-decoration: line-through; }
  .person-row.retired.active .person-name-input { color: #6b9db3; }
  .person-row.retired.active { background: #f0f8fc; }

  /* 컨텍스트 메뉴 */
  .ctx-menu {
    position: fixed; z-index: 9999;
    background: #fff; border: 1px solid var(--border);
    border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,.12);
    padding: 4px; min-width: 140px; font-size: 13px;
  }
  .ctx-menu button {
    display: block; width: 100%; text-align: left;
    border: none; background: none; cursor: pointer;
    padding: 7px 12px; border-radius: 4px;
    color: var(--text); font-family: var(--font); font-size: 13px;
  }
  .ctx-menu button:hover { background: #f0efee; }
  .ctx-menu button.danger { color: var(--danger); }
  .ctx-menu button.danger:hover { background: #fff0f0; }
  .ctx-menu button::before { content: ''; display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 8px; background: #c1bdb7; vertical-align: middle; flex-shrink: 0; }
  .ctx-menu button.danger::before { background: #eb5757; }
  .ctx-menu button.restore::before { background: #0f7b6c; }
  .ctx-menu .ctx-divider { border: none; border-top: 1px solid var(--border); margin: 3px 0; }

  .add-person-btn {
    display: block;
    width: 100%;
    text-align: left;
    padding: 5px 6px 8px 25px;
    border: none;
    background: none;
    cursor: pointer;
    color: var(--text-light);
    font-size: 12px;
    font-family: var(--font);
    transition: color 0.15s;
  }
  .add-person-btn:hover { color: var(--text-muted); }

  .sidebar-empty {
    padding: 10px 8px;
    font-size: 12.5px;
    color: var(--text-muted);
  }

  /* ── Buttons (bottom action row, like WeeklyPlan) ── */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 32px;
    justify-content: flex-end;
  }
  .btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 4px;
    font-size: 14px;
    font-family: var(--font);
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s;
    border: none;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary {
    background: #f0efee;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: #e3e2df; }

  /* Date navigator (top-right of content, like WeeklyPlan's week-nav) */
  .date-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    column-gap: 12px;
    margin-bottom: 28px;
  }
  .date-nav-left {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    min-width: 0;
    max-width: 100%;
  }
  .date-nav-label {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 500;
    max-width: 100%;
    overflow-wrap: break-word;
  }
  .date-nav-label .today-badge {
    display: inline-block;
    margin-left: 8px;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 600;
    background: var(--tag-bg);
    color: var(--tag-text);
    vertical-align: middle;
  }
  .search-trigger-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 12.5px;
    font-family: var(--font);
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
    transition: background 0.12s;
  }
  .search-trigger-btn:hover { background: var(--row-hover); }
  .nav-group { display: flex; gap: 6px; }
  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 13px;
    font-family: var(--font);
    display: flex;
    align-items: center;
    gap: 4px;
    transition: background 0.12s;
  }
  .nav-btn:hover { background: var(--row-hover); }
  .date-picker {
    color: var(--text);
    font-size: 13px;
    padding: 4px 8px;
  }
  .date-picker::-webkit-calendar-picker-indicator {
    cursor: pointer;
    opacity: 0.6;
  }

  .page-title-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  .page-emoji { font-size: 36px; }

  .page-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    border: none;
    outline: none;
    background: transparent;
    font-family: var(--font);
    width: auto;
    min-width: 80px;
    padding: 2px 0;
  }

  /* Meta row — unified with WeeklyPlan's 소속 / 담당자 design */
  .page-meta {
    display: grid;
    grid-template-columns: 230px 230px 1fr;
    column-gap: 12px;
    margin-bottom: 28px;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--text-muted);
    min-width: 0;
  }

  .meta-label { font-weight: 500; color: var(--text); min-width: 60px; flex-shrink: 0; }

  .meta-input {
    border: none;
    outline: none;
    background: transparent;
    font-size: 14px;
    color: var(--text);
    font-family: var(--font);
    border-bottom: 1px dashed var(--border);
    padding-bottom: 1px;
    min-width: 120px;
  }
  .meta-input:focus { border-bottom-color: var(--accent); }

  .meta-text {
    font-size: 14px;
    color: var(--text);
    padding-bottom: 1px;
  }

  /* SNS 현황 — same 3-column grid as page-meta, so the two rows line up */
  .sns-bar {
    display: grid;
    grid-template-columns: 230px 230px 1fr;
    column-gap: 12px;
    margin-bottom: 28px;
  }

  .sns-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12.5px;
    font-weight: 500;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
  }

  .sns-tag.youtube { background: #fff0f0; color: #c0392b; }
  .sns-tag.instagram { background: #fff4f9; color: #c2185b; }
  .sns-tag.homepage { background: #f0f4ff; color: #3a57e8; }

  .sns-tag input {
    background: transparent;
    border: none;
    outline: none;
    font-size: 12.5px;
    font-family: var(--font);
    color: inherit;
    width: 52px;
    height: 18px;
    line-height: 18px;
    padding: 0;
    margin: 0;
    -webkit-appearance: none;
    appearance: none;
    align-self: center;
    flex: 0 0 auto;
    font-weight: 600;
  }
  .sns-tag input:last-of-type { width: 40px; margin-right: 12px; }
  .sns-tag input:first-of-type { text-align: right; margin-left: auto; }
  /* 글자(/)가 아닌 작은 선으로 그려서, 폰트별 글리프 위치 차이로 인한 세로 어긋남을 원천적으로 없앰.
     숫자 글자의 cap-height에 맞춘 짧은 직선이라 어느 각도로 봐도 가운데로 보임 */
  .sns-tag .sns-slash {
    display: inline-block;
    width: 1.3px;
    height: 9.5px;
    background: currentColor;
    opacity: .4;
    transform: rotate(18deg);
    flex-shrink: 0;
    align-self: center;
    margin: 0 3px;
  }

  /* ── Table ── */
  .section-label {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
    margin-top: 28px;
  }

  .journal-table {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .table-row {
    display: grid;
    grid-template-columns: 110px 1fr 140px;
    border-bottom: 1px solid #dadad6;
    min-height: 44px;
    transition: background 0.1s;
  }
  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: var(--row-hover); }

  .table-row.header-row {
    background: var(--sidebar-bg);
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }
  .table-row.header-row:hover { background: var(--sidebar-bg); }

  .table-cell {
    padding: 10px 14px;
    border-right: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
  }
  .table-cell:last-child { border-right: none; }

  /* 구분 column (label cells) — same background as the header row, centered */
  .table-cell:first-child {
    background: var(--sidebar-bg);
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .cell-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    padding-top: 1px;
  }

  .cell-input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--font);
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.6;
    resize: none;
    min-height: 24px;
    padding: 0;
  }

  .cell-input::placeholder { color: var(--text-light); }

  .cell-input[contenteditable] {
    white-space: pre-wrap;
    overflow-wrap: break-word;
    cursor: text;
  }
  .cell-input[contenteditable]:empty:before {
    content: attr(data-placeholder);
    color: var(--text-light);
    pointer-events: none;
  }
  .cell-input[contenteditable]:focus {
    background: rgba(47,128,237,0.04);
    border-radius: 3px;
  }

  .cell-input-small {
    font-size: 12.5px;
    color: var(--text-muted);
  }

  /* ── 서식 툴바 (글자색 / 형광펜) ── */
  .format-toolbar {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    background: var(--sidebar-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    margin-bottom: 10px;
    font-size: 11px;
    color: var(--text-muted);
  }
  .format-toolbar-group { display: flex; align-items: center; gap: 5px; }
  .format-toolbar-label { font-weight: 600; letter-spacing: 0.02em; margin-right: 2px; }
  .swatch-btn {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.12);
    cursor: pointer;
    padding: 0;
    flex-shrink: 0;
    transition: transform 0.1s;
  }
  .swatch-btn:hover { transform: scale(1.15); }
  .swatch-btn.is-clear { background: #fff; position: relative; }
  .swatch-btn.is-clear:before {
    content: '';
    position: absolute;
    left: 2px; right: 2px; top: 50%;
    height: 1px;
    background: var(--danger);
    transform: rotate(45deg);
  }
  .swatch-btn.is-all {
    border-radius: 4px;
    width: auto;
    padding: 0 6px;
    height: 20px;
    line-height: 20px;
    border: 1px solid var(--border);
  }
  .swatch-btn.active-filter {
    box-shadow: 0 0 0 2px var(--accent);
  }
  .format-toolbar-divider { width: 1px; height: 18px; background: var(--border); }
  .format-clear-btn {
    border: none;
    background: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    font-family: var(--font);
  }
  .format-clear-btn:hover { background: rgba(0,0,0,0.06); color: var(--text); }
  .pdf-export .format-toolbar { display: none !important; }
  @media print { .format-toolbar { display: none !important; } }

  /* ── Notice bar ── */
  .notice-bar {
    margin-top: 28px;
    padding: 12px 16px;
    background: #fffbf0;
    border: 1px solid #f0e0a0;
    border-radius: 8px;
    font-size: 12.5px;
    color: #7a6000;
    line-height: 1.7;
  }

  .notice-bar strong { font-weight: 600; }

  /* ── Divider ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

  /* Checklist items in cell */
  .checklist { list-style: none; padding: 0; }
  .check-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 2px 0;
    font-size: 13.5px;
    line-height: 1.6;
  }
  .check-item input[type="checkbox"] {
    margin-top: 3px; flex-shrink: 0;
    width: 14px; height: 14px;
    cursor: pointer;
    accent-color: var(--accent);
  }
  .check-item span { flex: 1; }
  .check-item span.done { text-decoration: line-through; color: var(--text-muted); }

  /* Tag in 비고 */
  .stat-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
    background: var(--tag-bg);
    color: var(--tag-text);
    margin: 2px 2px 2px 0;
    white-space: nowrap;
  }

  /* ── Content search modal ── */
  .search-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,15,15,.45);
    z-index: 90;
  }
  .search-modal-overlay.show { display: block; }

  .search-modal {
    display: none;
    flex-direction: column;
    position: fixed;
    top: 8%;
    left: 50%;
    transform: translateX(-50%);
    width: 92%;
    max-width: 480px;
    max-height: 78vh;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 12px 40px rgba(0,0,0,.25);
    z-index: 91;
    overflow: hidden;
  }
  .search-modal.show { display: flex; }

  .search-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 14px;
  }
  .search-modal-close {
    border: none;
    background: none;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-muted);
    padding: 2px 6px;
  }
  .search-modal-close:hover { color: var(--text); }

  .search-modal-body {
    display: flex;
    gap: 8px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .search-input {
    flex: 1;
    min-width: 0;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    font-family: var(--font);
    outline: none;
    color: var(--text);
  }
  .search-input:focus { border-color: var(--accent); }
  .search-run-btn { padding: 8px 14px; font-size: 13px; flex-shrink: 0; }

let _db = null;
function getDb() {
  if (_db) return _db;
  if (!firebase.apps.length) firebase.initializeApp(_firebaseConfig);
  _db = firebase.firestore();
  return _db;
}
const FS_COL = 'dp_store';

async function storeGet(key) {
  try { const snap = await getDb().collection(FS_COL).doc(key).get(); return snap.exists ? snap.data().v : null; }
  catch(e) { return null; }
}
async function storeSet(key, value) {
  try { await getDb().collection(FS_COL).doc(key).set({ v: value }); return true; }
  catch(e) { console.error(e); return false; }
}
async function storeDelete(key) {
  try { await getDb().collection(FS_COL).doc(key).delete(); } catch(e) {}
}
async function storeList(prefix) {
  try {
    const snap = await getDb().collection(FS_COL)
      .where(firebase.firestore.FieldPath.documentId(), '>=', prefix)
      .where(firebase.firestore.FieldPath.documentId(), '<', prefix + '\uf8ff')
      .get();
    return snap.docs.map(d => d.id);
  } catch(e) { return []; }
}

function uid(prefix) { return prefix + '_' + Math.random().toString(36).slice(2, 9); }
function escapeAttr(str) { return String(str ?? '').replace(/&/g, '&amp;').replace(/"/g, '&quot;'); }
function esc(s='') { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// 기존에는 일반 텍스트(줄바꿈 \n)로 저장되어 있었고, 글자색/형광펜 적용 이후에는 HTML로 저장됨.
// 둘 다 안전하게 화면에 표시하기 위한 헬퍼.
function toDisplayHtml(raw) {
  const s = String(raw ?? '');
  if (!s) return '';
  if (/<[a-z][\s\S]*>/i.test(s)) return s; // 이미 HTML(색상/형광펜 서식 포함)로 저장된 값
  return esc(s).replace(/\n/g, '<br>');
}
function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = String(html ?? '');
  return tmp.textContent || tmp.innerText || '';
}

function findPerson(personId) {
  for (const team of TEAMS) {
    const m = team.members.find(m => m.id === personId);
    if (m) return { team, person: m };
  }
  return null;
}

// ══════════════════════════════════════
//  Date helpers
// ══════════════════════════════════════
function dateForOffset(offset) {
  const d = new Date();
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + offset);
  return d;
}
function dateId(d) {
  const y = String(d.getFullYear()).slice(2);
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}${m}${day}`;
}
function dateDisplay(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}.${m}.${day} (${DAY_KO[d.getDay()]})`;
}
// yyyy-mm-dd (local) for <input type="date"> value
function toInputValue(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
// integer day-count between two midnight Date objects (DST-safe)
function dayDiff(a, b) {
  const utcA = Date.UTC(a.getFullYear(), a.getMonth(), a.getDate());
  const utcB = Date.UTC(b.getFullYear(), b.getMonth(), b.getDate());
  return Math.round((utcB - utcA) / 86400000);
}

function renderDateNav() {
  const d = dateForOffset(currentDayOffset);
  const badge = currentDayOffset === 0 ? '<span class="today-badge">오늘</span>' : '';
  document.getElementById('dateNavLabel').innerHTML = dateDisplay(d) + badge;
  const picker = document.getElementById('dateNavPicker');
  if (picker) picker.value = toInputValue(d);
}

async function changeDate(dir) {
  await saveCurrentState(true);
  currentDayOffset += dir;
  renderDateNav();
  await loadPersonDate();
}

async function jumpToDate(value) {
  if (!value) return; // empty/cleared input — ignore
  const [y, m, day] = value.split('-').map(Number);
  const target = new Date(y, m - 1, day);
  target.setHours(0,0,0,0);
  const today = new Date();
  today.setHours(0,0,0,0);
  await saveCurrentState(true);
  currentDayOffset = dayDiff(today, target);
  renderDateNav();
  await loadPersonDate();
}

async function goToToday() {
  if (currentDayOffset === 0) return;
  await saveCurrentState(true);
  currentDayOffset = 0;
  renderDateNav();
  await loadPersonDate();
}

async function loadTeams() {

  if (raw) { try { return JSON.parse(raw); } catch(e) {} }
  return JSON.parse(JSON.stringify(DEFAULT_TEAMS));
}
function persistTeams() { storeSet(TEAMS_KEY, JSON.stringify(TEAMS)); }

async function seedDemoIfNeeded() {
  if (!findPerson(DEMO_PERSON_ID)) return;
  const existing = await storeGet(entryKey(DEMO_PERSON_ID, DEMO_DATE_ID));
  if (!existing) await storeSet(entryKey(DEMO_PERSON_ID, DEMO_DATE_ID), JSON.stringify(DEMO_DATA));
}

async function cleanupPersonEntries(personId) {
  const keys = await storeList(`dp_entry_${personId}_`);
  for (const k of keys) { await storeDelete(k); }
}

//  Sidebar (teams / members, 2-depth)

function renderSidebar() {
  const tree = document.getElementById('sidebarTree');
  tree.innerHTML = '';

  if (TEAMS.length === 0) {
    tree.innerHTML = '<div class="sidebar-empty">팀이 없습니다. "+ 팀 추가"로 시작하세요.</div>';
    return;
  }

  const allRetired = TEAMS.flatMap(t => t.members.filter(m => m.retired).map(m => ({ team: t, person: m })));

  TEAMS.forEach(team => {
    const activeMembers = team.members.filter(m => !m.retired);

    const group = document.createElement('div');
    group.className = 'team-group' + (collapsedTeams.has(team.id) ? ' collapsed' : '');

    const row = document.createElement('div');
    row.className = 'team-row';
    row.dataset.teamId = team.id;
    row.innerHTML = `
      <span class="team-chevron">▾</span>
      <span class="team-dot"></span>
      <input class="team-name-input" value="${escapeAttr(team.name)}" />
      <button class="team-action" title="팀 삭제">✕</button>
    `;
    const nameInput = row.querySelector('.team-name-input');
    const removeBtn = row.querySelector('.team-action');

    row.addEventListener('click', () => toggleTeam(team.id));
    nameInput.addEventListener('click', (e) => e.stopPropagation());
    nameInput.addEventListener('input', () => {
      team.name = nameInput.value;
      persistTeams();
      if (team.members.some(m => m.id === selectedPersonId)) updateBreadcrumb();
      const teamEl = document.getElementById('metaTeam');
      if (teamEl && team.members.some(m => m.id === selectedPersonId)) teamEl.textContent = team.name;
    });
    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) { e.preventDefault(); nameInput.blur(); }
    });
    removeBtn.addEventListener('click', (e) => { e.stopPropagation(); removeTeam(team.id); });

    group.appendChild(row);

    const list = document.createElement('ul');
    list.className = 'member-list';
    activeMembers.forEach(person => {
      list.appendChild(buildPersonLi(team, person));
    });
    group.appendChild(list);

    const addPersonBtn = document.createElement('button');
    addPersonBtn.className = 'add-person-btn';
    addPersonBtn.textContent = '+ 구성원 추가';
    addPersonBtn.addEventListener('click', (e) => { e.stopPropagation(); addMember(team.id); });
    group.appendChild(addPersonBtn);

    tree.appendChild(group);
  });

  if (allRetired.length > 0) {
    const retiredSection = document.createElement('div');
    retiredSection.className = 'retired-section' + (collapsedTeams.has('__retired__') ? ' collapsed' : '');

    const header = document.createElement('div');
    header.className = 'retired-section-header';
    header.innerHTML = `<span class="retired-chevron">▾</span><span class="retired-section-label">퇴사자 (${allRetired.length})</span>`;
    header.addEventListener('click', () => {
      if (collapsedTeams.has('__retired__')) collapsedTeams.delete('__retired__');
      else collapsedTeams.add('__retired__');
      renderSidebar();
    });
    retiredSection.appendChild(header);

    const rList = document.createElement('ul');
    rList.className = 'retired-member-list';
    allRetired.forEach(({ team, person }) => {
      rList.appendChild(buildPersonLi(team, person));
    });
    retiredSection.appendChild(rList);
    tree.appendChild(retiredSection);
  }
}

function buildPersonLi(team, person) {
  const li = document.createElement('li');
  const pRow = document.createElement('div');
  const isRetired = !!person.retired;
  pRow.className = 'person-row' + (person.id === selectedPersonId ? ' active' : '') + (isRetired ? ' retired' : '');
  pRow.dataset.personId = person.id;
  pRow.innerHTML = `
    <span class="person-dot"></span>
    <input class="person-name-input" value="${escapeAttr(person.name)}" ${isRetired ? 'readonly' : ''} />
    <span class="person-spacer" title="선택하고 일지 보기"></span>
    <button class="person-action" title="옵션">···</button>
  `;
  const pInput = pRow.querySelector('.person-name-input');
  const pSpacer = pRow.querySelector('.person-spacer');
  const pActionBtn = pRow.querySelector('.person-action');

  pRow.addEventListener('click', () => selectPerson(person.id));
  pInput.addEventListener('click', (e) => { e.stopPropagation(); if (!isRetired) selectPerson(person.id, false, true); });
  pSpacer.addEventListener('click', (e) => { e.stopPropagation(); selectPerson(person.id); });
  if (!isRetired) {
    pInput.addEventListener('input', () => {
      person.name = pInput.value;
      persistTeams();
      if (person.id === selectedPersonId) {
        updateBreadcrumb();
        const managerEl = document.getElementById('metaManager');
        if (managerEl) managerEl.textContent = person.name;
      }
    });
    pInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) { e.preventDefault(); pInput.blur(); closeSidebarMobile(); }
    });
  }
  pActionBtn.addEventListener('click', (e) => { e.stopPropagation(); showPersonMenu(e, team.id, person); });

  li.appendChild(pRow);
  return li;
}

function showPersonMenu(e, teamId, person) {
  document.querySelectorAll('.ctx-menu').forEach(m => m.remove());

  const menu = document.createElement('div');
  menu.className = 'ctx-menu';

  if (!person.retired) {
    const retireBtn = document.createElement('button');
    retireBtn.className = 'retire'; retireBtn.textContent = '퇴사 처리';
    retireBtn.addEventListener('click', () => { menu.remove(); retireMember(teamId, person.id); });
    menu.appendChild(retireBtn);

    const div1 = document.createElement('hr');
    div1.className = 'ctx-divider';
    menu.appendChild(div1);
  } else {
    const restoreBtn = document.createElement('button');
    restoreBtn.className = 'restore'; restoreBtn.textContent = '복직 처리';
    restoreBtn.addEventListener('click', () => { menu.remove(); restoreMember(teamId, person.id); });
    menu.appendChild(restoreBtn);

    const div1 = document.createElement('hr');
    div1.className = 'ctx-divider';
    menu.appendChild(div1);
  }

  const deleteBtn = document.createElement('button');
  deleteBtn.textContent = '완전 삭제';
  deleteBtn.className = 'danger';
  deleteBtn.addEventListener('click', () => { menu.remove(); removeMember(teamId, person.id); });
  menu.appendChild(deleteBtn);

  document.body.appendChild(menu);
  const rect = e.target.getBoundingClientRect();
  const mw = menu.offsetWidth, mh = menu.offsetHeight;
  let top = rect.bottom + 4, left = rect.left;
  if (top + mh > window.innerHeight) top = rect.top - mh - 4;
  if (left + mw > window.innerWidth) left = window.innerWidth - mw - 8;
  menu.style.top = top + 'px';
  menu.style.left = left + 'px';

  const close = (ev) => { if (!menu.contains(ev.target)) { menu.remove(); document.removeEventListener('click', close, true); } };
  setTimeout(() => document.addEventListener('click', close, true), 0);
}

function retireMember(teamId, personId) {
  const team = TEAMS.find(t => t.id === teamId);
  if (!team) return;
  const person = team.members.find(m => m.id === personId);
  if (!person) return;
  person.retired = true;
  persistTeams();

  if (selectedPersonId === personId) {
    const active = TEAMS.flatMap(t => t.members).find(m => !m.retired);
    selectedPersonId = active?.id ?? null;
    storeSet(SELECTED_KEY, selectedPersonId || '');
    loadPersonDate();
  }
  renderSidebar();
}

function restoreMember(teamId, personId) {
  const team = TEAMS.find(t => t.id === teamId);
  if (!team) return;
  const person = team.members.find(m => m.id === personId);
  if (!person) return;
  delete person.retired;
  persistTeams();
  renderSidebar();
}

async function removeMember(teamId, personId) {
  const team = TEAMS.find(t => t.id === teamId);
  if (!team) return;
  if (!confirm('완전 삭제하면 저장된 일지도 모두 사라집니다. 계속할까요?')) return;

  team.members = team.members.filter(m => m.id !== personId);
  persistTeams();
  await cleanupPersonEntries(personId);

  if (selectedPersonId === personId) {
    selectedPersonId = TEAMS.flatMap(t => t.members).find(m => !m.retired)?.id ?? null;
    storeSet(SELECTED_KEY, selectedPersonId || '');
    await loadPersonDate();
  }
  renderSidebar();
}

function toggleTeam(teamId) {
  if (collapsedTeams.has(teamId)) collapsedTeams.delete(teamId);
  else collapsedTeams.add(teamId);
  renderSidebar();
}

function addTeam() {
  const team = { id: uid('t'), name: '새 팀', members: [] };
  TEAMS.push(team);
  persistTeams();
  renderSidebar();
  requestAnimationFrame(() => {
    const el = document.querySelector(`.team-row[data-team-id="${team.id}"] .team-name-input`);
    if (el) { el.focus(); el.select(); }
  });
}

async function removeTeam(teamId) {
  const team = TEAMS.find(t => t.id === teamId);
  if (!team) return;
  if (!confirm(`'${team.name}' 팀을 삭제할까요? 구성원과 저장된 일지도 함께 제거됩니다.`)) return;

  for (const m of team.members) { await cleanupPersonEntries(m.id); }
  TEAMS = TEAMS.filter(t => t.id !== teamId);
  persistTeams();

  if (team.members.some(m => m.id === selectedPersonId)) {
    selectedPersonId = TEAMS[0]?.members[0]?.id ?? null;
    storeSet(SELECTED_KEY, selectedPersonId || '');
    await loadPersonDate();
  }
  renderSidebar();
}

async function addMember(teamId) {
  const team = TEAMS.find(t => t.id === teamId);
  if (!team) return;
  const person = { id: uid('p'), name: '새 구성원' };
  team.members.push(person);
  persistTeams();
  await selectPerson(person.id, true, true);
  requestAnimationFrame(() => {
    const el = document.querySelector(`.person-row[data-person-id="${person.id}"] .person-name-input`);
    if (el) { el.focus(); el.select(); }
  });
}

async function selectPerson(personId, skipSave, skipMobileClose) {
  if (personId === selectedPersonId) { if (!skipMobileClose) closeSidebarMobile(); return; }
  if (!skipSave) await saveCurrentState(true);
  selectedPersonId = personId;
  storeSet(SELECTED_KEY, personId || '');
  renderSidebar();
  await loadPersonDate();
  if (!skipMobileClose) closeSidebarMobile();
}

function updateBreadcrumb() {
  const found = findPerson(selectedPersonId);
  const el = document.getElementById('topPerson');
  if (el) el.textContent = found ? `${found.team.name} · ${found.person.name}` : '—';
}

async function saveCurrentState(silent) {
  if (!selectedPersonId) { if (!silent) showToast('선택된 구성원이 없습니다.', true); return; }
  const anchorEl = document.getElementById('f_yt');
  if (!anchorEl) return; // nothing rendered to save

  const found = findPerson(selectedPersonId);
  const g = id => document.getElementById(id)?.value || '';
  const gHtml = id => {
    const el = document.getElementById(id);
    if (!el) return '';
    const html = el.innerHTML;
    if (!html || html === '<br>' || html.trim() === '') return '';
    return html;
  };
  const data = {
    manager: found ? found.person.name : '',
    yt: g('f_yt'), yt_sub: g('f_yt_sub'),
    ig: g('f_ig'), ig_sub: g('f_ig_sub'),
    homepage: g('f_homepage'), homepage_sub: g('f_homepage_sub'),
    directive: gHtml('f_directive'), directive_note: gHtml('f_directive_note'),
    tasks: gHtml('f_tasks'), tasks_note: gHtml('f_tasks_note'),
    tomorrow: gHtml('f_tomorrow'), tomorrow_note: gHtml('f_tomorrow_note'),
    pending: gHtml('f_pending'), pending_note: gHtml('f_pending_note'),
    profComments: dpGetCurrentComments(),
    signature: dpCurrentSignature,
  };

  const d = dateForOffset(currentDayOffset);
  const id = dateId(d);
  const ok = await storeSet(entryKey(selectedPersonId, id), JSON.stringify(data));
  if (!silent) {
    if (ok) showToast('저장되었습니다 ✓'); else showToast('저장 실패', true);
  }
}

function saveEntry() { saveCurrentState(false); }

async function clearCurrent() {
  if (!selectedPersonId) { showToast('선택된 구성원이 없습니다.', true); return; }
  if (!confirm('현재 화면(이 구성원 · 이 날짜)의 내용을 초기화할까요?')) return;
  const d = dateForOffset(currentDayOffset);
  const id = dateId(d);
  await storeDelete(entryKey(selectedPersonId, id));
  await loadPersonDate();
}

async function printPlan() {
  await saveCurrentState(true);
  const found = findPerson(selectedPersonId);
  const d = dateForOffset(currentDayOffset);
  const label = (found ? `${found.team.name}_${found.person.name}_${dateId(d)}` : '업무일지').replace(/\s+/g, '_');

  const isMobile = window.innerWidth <= 880 || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  if (isMobile && window.html2pdf) {
    showToast('PDF 생성 중...');
    const pageEl = document.querySelector('.page');

    // html2canvas는 현재 스크롤 위치를 기준으로 캡처 영역을 잡기 때문에,
    // 페이지가 스크롤된 상태에서 캡처하면 위쪽에 빈 여백이 생기고 아래쪽 내용이 잘립니다.
    // → 캡처 전 항상 맨 위로 스크롤하고, scrollX/scrollY를 0으로 고정합니다.
    const prevScrollX = window.scrollX, prevScrollY = window.scrollY;
    window.scrollTo(0, 0);
    await new Promise(resolve => setTimeout(resolve, 80));

    document.body.classList.add('pdf-export');
    pageEl.classList.add('pdf-export'); // html2canvas only clones pageEl's own subtree, not <body> — the class must live on pageEl itself to survive into the clone

    // html2canvas는 캡처 시점에 <input>의 실제 화면 표시값을 제대로 못 읽어오는
    // 알려진 버그가 있어, value/attribute를 바꾸는 방식은 근본적으로 불안정합니다.
    // → 캡처 직전에 input을 통째로 일반 텍스트(span)로 잠깐 바꿔치기해서 찍고,
    //   캡처가 끝나면 다시 원래 input으로 되돌립니다.
    const snsIds = ['f_yt', 'f_yt_sub', 'f_ig', 'f_ig_sub', 'f_homepage', 'f_homepage_sub'];
    const snsRestore = [];
    snsIds.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      const text = el.value.trim() === '' ? '0' : el.value;
      const cs = window.getComputedStyle(el);
      const span = document.createElement('span');
      span.textContent = text;
      span.style.cssText = [
        `display:inline-block`,
        `width:${cs.width}`,
        `height:${cs.height}`,
        `line-height:${cs.height}`,
        `font-size:${cs.fontSize}`,
        `font-family:${cs.fontFamily}`,
        `font-weight:${cs.fontWeight}`,
        `color:${cs.color}`,
        `text-align:${cs.textAlign}`,
        `margin:${cs.marginTop} ${cs.marginRight} ${cs.marginBottom} ${cs.marginLeft}`,
        `padding:0`,
        `vertical-align:middle`,
        `flex:0 0 auto`,
        `white-space:nowrap`,
      ].join(';');
      el.insertAdjacentElement('afterend', span);
      el.style.display = 'none';
      snsRestore.push({ el, span });
    });

    try {
      // A4 한 장에 내용이 잘리지 않고 딱 맞게 들어가도록, 캡처한 이미지를 직접 계산해서 배치합니다.
      // (html2pdf의 자동 페이지분할에 맡기면 세로가 긴 내용이 landscape 페이지 높이를 넘겨
      //  두 페이지로 나뉘거나, scale 옵션과 맞물려 오른쪽이 잘리는 문제가 있어 직접 한 장으로 만듭니다.)
      const worker = html2pdf().set({
        margin: 0,
        filename: `${label}.pdf`,
        image: { type: 'png' },
        html2canvas: {
          scale: 2,
          useCORS: true,
          scrollX: 0,
          scrollY: 0,
          windowWidth: 1000,
        },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
      }).from(pageEl);

      // .get()은 이미 만들어진 값을 읽기만 할 뿐 직접 만들어주지 않으므로,
      // toCanvas()/toPdf()를 명시적으로 먼저 실행해야 합니다.
      await worker.toCanvas();
      const canvas = await worker.get('canvas');
      // 캡처된 내용의 가로/세로 비율을 보고 더 잘 맞는 A4 방향을 자동으로 선택
      const orientation = canvas.width >= canvas.height ? 'landscape' : 'portrait';
      worker.set({ jsPDF: { unit: 'mm', format: 'a4', orientation } });

      await worker.toPdf();
      const pdf = await worker.get('pdf');
      // 기본 파이프라인이 만든 페이지(여러 장으로 잘렸을 수 있음)는 지우고 한 장만 남깁니다.
      for (let i = pdf.internal.getNumberOfPages(); i > 1; i--) pdf.deletePage(i);
      pdf.setPage(1);

      const pageWidth = pdf.internal.pageSize.getWidth();
      const pageHeight = pdf.internal.pageSize.getHeight();
      pdf.setFillColor(255, 255, 255);
      pdf.rect(0, 0, pageWidth, pageHeight, 'F'); // 기본 배치로 그려졌던 내용을 지움

      const margin = 8; // mm, 종이 여백
      const maxW = pageWidth - margin * 2;
      const maxH = pageHeight - margin * 2;
      const ratio = Math.min(maxW / canvas.width, maxH / canvas.height);
      const imgW = canvas.width * ratio;
      const imgH = canvas.height * ratio;
      const x = (pageWidth - imgW) / 2;
      const y = (pageHeight - imgH) / 2;
      pdf.addImage(canvas.toDataURL('image/png'), 'PNG', x, y, imgW, imgH);

      await worker.save();
    } catch (e) {
      console.error(e);
      showToast('PDF 생성 실패: ' + (e && e.message ? e.message : e), true);
    } finally {
      document.body.classList.remove('pdf-export');
      pageEl.classList.remove('pdf-export');
      snsRestore.forEach(({ el, span }) => {
        span.remove();
        el.style.display = '';
      });
      window.scrollTo(prevScrollX, prevScrollY);
    }
  } else {
    const prevTitle = document.title;
    document.title = label;
    window.print();
    setTimeout(() => { document.title = prevTitle; }, 500);
  }
}

function escRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

// ── 색상 필터 (글자색/형광펜만 따로 검색) ──
let dpFilterText = 'all';       // 'all' | 특정 hex
let dpFilterHighlight = 'all';  // 'all' | 특정 hex

function dpBuildColorFilterUI() {
  const box = document.getElementById('searchColorFilters');
  if (!box || box.dataset.built) return;
  box.dataset.built = '1';
  const textChips = [{ label: '전체', value: 'all' }, ...DP_TEXT_COLORS]
    .map(c => `<button type="button" class="swatch-btn${c.value === 'all' ? ' is-all' : ''}" data-kind="text" data-value="${c.value}" style="${c.value === 'all' ? 'background:#fff;font-size:9px;color:var(--text-muted);' : `background:${c.value}`}" title="${c.label}" onclick="dpSetColorFilter('text','${c.value}')">${c.value === 'all' ? '전체' : ''}</button>`)
    .join('');
  const hiliteChips = [{ label: '전체', value: 'all' }, ...DP_HILITE_COLORS]
    .map(c => `<button type="button" class="swatch-btn${c.value === 'all' ? ' is-all' : ''}" data-kind="highlight" data-value="${c.value}" style="${c.value === 'all' ? 'background:#fff;font-size:9px;color:var(--text-muted);' : `background:${c.value}`}" title="${c.label}" onclick="dpSetColorFilter('highlight','${c.value}')">${c.value === 'all' ? '전체' : ''}</button>`)
    .join('');
  box.innerHTML = `
    <div class="format-toolbar-group"><span class="format-toolbar-label">글자색</span>${textChips}</div>
    <div class="format-toolbar-divider"></div>
    <div class="format-toolbar-group"><span class="format-toolbar-label">형광펜</span>${hiliteChips}</div>
  `;
  dpRefreshColorFilterUI();
}
function dpSetColorFilter(kind, value) {
  if (kind === 'text') dpFilterText = value; else dpFilterHighlight = value;
  dpRefreshColorFilterUI();
  runSearch();
}
function dpRefreshColorFilterUI() {
  const box = document.getElementById('searchColorFilters');
  if (!box) return;
  box.querySelectorAll('[data-kind="text"]').forEach(btn => btn.classList.toggle('active-filter', btn.dataset.value === dpFilterText));
  box.querySelectorAll('[data-kind="highlight"]').forEach(btn => btn.classList.toggle('active-filter', btn.dataset.value === dpFilterHighlight));
}

  if (!selectedPersonId) { showToast('먼저 구성원을 선택하세요.', true); return; }

}
function closeSearchModal() {

const SEARCH_FIELDS = [
  ['directive', '교수님 지시사항'], ['directive_note', '교수님 지시사항·비고'],
  ['tasks', '금일 진행 업무'], ['tasks_note', '금일 진행 업무·비고'],
  ['tomorrow', '익일 업무'], ['tomorrow_note', '익일 업무·비고'],
  ['pending', '미진행 업무'], ['pending_note', '미진행 업무·비고'],
];

function dateIdToDateObj(id) {
  const y = 2000 + parseInt(id.slice(0,2), 10);
  const m = parseInt(id.slice(2,4), 10) - 1;
  const day = parseInt(id.slice(4,6), 10);
  return new Date(y, m, day);
}

async function runSearch() {
  const resultsEl = document.getElementById('searchResults');
  const q = document.getElementById('searchInput').value.trim();
  const hasColorFilter = dpFilterText !== 'all' || dpFilterHighlight !== 'all';
  if (!q && !hasColorFilter) { resultsEl.innerHTML = '<div class="search-empty">검색어를 입력하거나 색상 필터를 선택하세요.</div>'; return; }
  if (!selectedPersonId) return;

  resultsEl.innerHTML = '<div class="search-empty">검색 중...</div>';
  const qLower = q.toLowerCase();
  const keys = await storeList(`dp_entry_${selectedPersonId}_`);

  const matches = [];
  for (const key of keys) {
    const raw = await storeGet(key);
    if (!raw) continue;
    let data; try { data = JSON.parse(raw); } catch(e) { continue; }

    for (const [field, fieldLabel] of SEARCH_FIELDS) {
      const rawField = data[field] || '';

      // 색상 필터가 걸려 있으면, 이 필드에 해당 글자색/형광펜이 실제로 쓰였는지 확인
      if (hasColorFilter) {
        const colors = dpDetectColorsInHtml(rawField);
        if (dpFilterText !== 'all' && !colors.text.has(dpFilterText)) continue;
        if (dpFilterHighlight !== 'all' && !colors.highlight.has(dpFilterHighlight)) continue;
      }

      const val = stripHtml(rawField);

      if (q) {
        const idx = val.toLowerCase().indexOf(qLower);
        if (idx === -1) continue;
        const start = Math.max(0, idx - 18);
        const end = Math.min(val.length, idx + q.length + 18);
        const snippet = (start > 0 ? '…' : '') + val.slice(start, end) + (end < val.length ? '…' : '');
        const dId = key.slice(`dp_entry_${selectedPersonId}_`.length);
        matches.push({ dateId: dId, fieldLabel, snippet });
      } else {
        // 키워드 없이 색상 필터만 걸었을 때는 필드 내용 앞부분을 보여줌
        const snippet = val.slice(0, 40) + (val.length > 40 ? '…' : '');
        const dId = key.slice(`dp_entry_${selectedPersonId}_`.length);
        matches.push({ dateId: dId, fieldLabel, snippet });
      }
      break; // 항목당 한 번만, 같은 날짜에서 여러 필드가 일치해도 한 결과로
    }
  }

  matches.sort((a, b) => b.dateId.localeCompare(a.dateId));

  if (matches.length === 0) {
    resultsEl.innerHTML = '<div class="search-empty">검색 결과가 없습니다.</div>';
    return;
  }

  const re = q ? new RegExp(escRegex(esc(q)), 'gi') : null;
  resultsEl.innerHTML = matches.map(m => {
    const dObj = dateIdToDateObj(m.dateId);
    const dispDate = dateDisplay(dObj);
    const highlighted = re ? esc(m.snippet).replace(re, s => `<mark>${s}</mark>`) : esc(m.snippet);
    return `<div class="search-result-item" onclick="goToSearchResult('${m.dateId}')">
      <div class="search-result-date">${dispDate} · ${esc(m.fieldLabel)}</div>
      <div class="search-result-snippet">${highlighted}</div>
    </div>`;
  }).join('');
}

async function goToSearchResult(dId) {
  const target = dateIdToDateObj(dId);
  target.setHours(0,0,0,0);
  const today = new Date(); today.setHours(0,0,0,0);
  await saveCurrentState(true);
  currentDayOffset = dayDiff(today, target);
  renderDateNav();
  await loadPersonDate();
  closeSearchModal();
  closeSidebarMobile();
}

// ══ 글자색 · 형광펜 서식 ══
const DP_TEXT_COLORS = [
  { label: '검정', value: '#37352f' },
  { label: '빨강', value: '#eb5757' },
  { label: '파랑', value: '#2f80ed' },
];
const DP_HILITE_COLORS = [
  { label: '노랑', value: '#fff3a3' },
  { label: '빨강', value: '#ffd0d0' },
  { label: '파랑', value: '#cde3fb' },
];

// 브라우저는 inline style의 색을 rgb(r, g, b) 형식으로 정규화해서 저장하므로,
// 우리가 쓴 hex 값과 실제 저장된 값을 비교하려면 같은 방식으로 정규화해서 맞춰봐야 함.
function dpHexToRgb(hex) {
  const d = document.createElement('span');
  d.style.color = hex;
  return d.style.color;
}
const DP_TEXT_RGB_TO_META = {};
DP_TEXT_COLORS.forEach(c => { DP_TEXT_RGB_TO_META[dpHexToRgb(c.value)] = c; });
const DP_HILITE_RGB_TO_META = {};
DP_HILITE_COLORS.forEach(c => { DP_HILITE_RGB_TO_META[dpHexToRgb(c.value)] = c; });

// 저장된 필드의 HTML을 스캔해서, 우리가 알고 있는 팔레트 중 어떤 글자색/형광펜이
// 쓰였는지 찾아냄 (검색/필터에서 사용)
function dpDetectColorsInHtml(html) {
  const out = { text: new Set(), highlight: new Set() };
  if (!html) return out;
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  tmp.querySelectorAll('[style]').forEach(node => {
    const c = node.style.color;
    const b = node.style.backgroundColor;
    if (c && DP_TEXT_RGB_TO_META[c]) out.text.add(DP_TEXT_RGB_TO_META[c].value);
    if (b && b !== 'transparent' && DP_HILITE_RGB_TO_META[b]) out.highlight.add(DP_HILITE_RGB_TO_META[b].value);
  });
  return out;
}

function dpEnsureEditableFocus() {
  const ae = document.activeElement;
  if (!(ae && ae.classList && ae.classList.contains('cell-input') && ae.isContentEditable)) {
    showToast('먼저 색을 적용할 칸을 클릭(또는 드래그로 선택)한 후 눌러주세요.', true);
    return null;
  }
  return ae;
}
// 현재 선택 범위 정보를 가져옴 (선택이 없으면 null)
function dpGetSelRange() {
  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0) return null;
  return { sel, range: sel.getRangeAt(0) };
}
// 커서가 이전 서식(색/형광펜) span의 맨 끝(또는 맨 앞)에 있을 때, 그 span '안쪽'에
// 그대로 마커를 넣으면 부모 span 속으로 중첩되어 background:transparent가
// 부모의 형광펜 색을 그대로 비쳐 보이게 만드는 문제가 있음(자식의 투명 배경은
// 부모 배경을 가리지 못함). → 커서가 서식 span의 경계에 있는 동안은 계속
// 바깥쪽으로 타고 올라가, 그 서식 span의 형제(옆) 위치로 삽입 지점을 옮긴다.
function dpEscapeStyledBoundary(root, range) {
  let container = range.startContainer;
  let offset = range.startOffset;
  while (container && container !== root) {
    const len = container.nodeType === 3 ? container.length : container.childNodes.length;
    const parent = container.parentNode;
    if (!parent) break;
    if (offset === len) {
      const idx = Array.prototype.indexOf.call(parent.childNodes, container);
      container = parent; offset = idx + 1;
    } else if (offset === 0) {
      const idx = Array.prototype.indexOf.call(parent.childNodes, container);
      container = parent; offset = idx;
    } else {
      break; // 서식의 중간 지점이면 더 이상 밖으로 빠져나가지 않음(흔치 않은 경우)
    }
  }
  const r = document.createRange();
  r.setStart(container, offset);
  r.collapse(true);
  return r;
}
// 폭 0(zero-width) 글자를 원하는 서식으로 직접 심어두고 그 뒤에 커서를 놓아,
// 이어서 입력하는 글자가 확실히 그 서식을 물려받도록 함.
// (커서만 있는 상태에서는 execCommand의 "이후 타이핑 서식"이 브라우저마다
//  불안정하게 동작하는 경우가 있어, 직접 DOM에 심는 방식을 사용)
function dpInsertTypingMarker(el, range, styleProps) {
  const escapedRange = dpEscapeStyledBoundary(el, range);
  const span = document.createElement('span');
  Object.assign(span.style, styleProps);
  span.appendChild(document.createTextNode('\u200B'));
  escapedRange.insertNode(span);
  const sel = window.getSelection();
  const newRange = document.createRange();
  newRange.setStart(span.firstChild, 1);
  newRange.collapse(true);
  sel.removeAllRanges();
  sel.addRange(newRange);
}
function dpApplyColor(color) {
  const el = dpEnsureEditableFocus();
  if (!el) return;
  const info = dpGetSelRange();
  try { document.execCommand('styleWithCSS', false, true); } catch (e) {}
  if (info && info.range.collapsed) {
    dpInsertTypingMarker(el, info.range, { color });
  } else {
    document.execCommand('foreColor', false, color);
  }
  saveCurrentState(true);
}
function dpApplyHighlight(color) {
  const el = dpEnsureEditableFocus();
  if (!el) return;
  const info = dpGetSelRange();
  try { document.execCommand('styleWithCSS', false, true); } catch (e) {}
  if (info && info.range.collapsed) {
    dpInsertTypingMarker(el, info.range, { backgroundColor: color });
  } else {
    const cmd = document.queryCommandSupported && document.queryCommandSupported('hiliteColor') ? 'hiliteColor' : 'backColor';
    document.execCommand(cmd, false, color);
  }
  saveCurrentState(true);
}
function dpClearFormat() {
  const el = dpEnsureEditableFocus();
  if (!el) return;
  const info = dpGetSelRange();
  try { document.execCommand('styleWithCSS', false, true); } catch (e) {}
  document.execCommand('removeFormat');
  // removeFormat은 '선택된' 글자에만 적용됨. 커서만 있는 상태라면
  // removeFormat 이후에도 그 자리의 서식이 남아있을 수 있으므로,
  // 기본 글자색(검정) + 형광펜 없음(투명)을 확실히 다시 심어준다.
  const sel2 = window.getSelection();
  if (info && info.range.collapsed && sel2 && sel2.rangeCount) {
    dpInsertTypingMarker(el, sel2.getRangeAt(0), { color: '#37352f', backgroundColor: 'transparent' });
  } else {
    document.execCommand('foreColor', false, '#37352f');
    const hiliteCmd = document.queryCommandSupported && document.queryCommandSupported('hiliteColor') ? 'hiliteColor' : 'backColor';
    document.execCommand(hiliteCmd, false, 'transparent');
  }
  saveCurrentState(true);
}

function showToast(msg, isError = false) {
  const toast = document.createElement('div');
  toast.textContent = msg;
  Object.assign(toast.style, {
    position: 'fixed', bottom: '32px', right: '32px',
    background: isError ? '#eb5757' : '#37352f',
    color: '#fff', padding: '10px 18px', borderRadius: '6px',
    fontSize: '14px', zIndex: 9999,
    boxShadow: '0 4px 12px rgba(0,0,0,.15)',
    transition: 'opacity 0.3s',
  });
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity = 0; setTimeout(() => toast.remove(), 300); }, 2000);
}

// ══════════════════════════════════════
//  Init
// ══════════════════════════════════════
async function init() {
  TEAMS = await loadTeams();
  selectedPersonId = null;
  await seedDemoIfNeeded();

  renderSidebar();
  renderDateNav();

  const searchInput = document.getElementById('searchInput');
  if (searchInput) {
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) { e.preventDefault(); runSearch(); }
    });
  }
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeSearchModal();
  });

  if (selectedPersonId) {
    await loadPersonDate();
  } else {
    updateBreadcrumb();
  }
}

function autoSizeInput(el) {
  if (!el) return;
  const ruler = document.createElement('span');
  const cs = getComputedStyle(el);
  ruler.style.cssText = 'visibility:hidden;position:absolute;white-space:pre;font-size:' + cs.fontSize + ';font-weight:' + cs.fontWeight + ';font-family:' + cs.fontFamily + ';letter-spacing:' + cs.letterSpacing;
  ruler.textContent = el.value || el.placeholder || '';
  document.body.appendChild(ruler);
  el.style.width = Math.max(80, ruler.offsetWidth + 16) + 'px';
  document.body.removeChild(ruler);
}

// ══ 교수님 모드 · 코멘트 · 서명 ══
let professorMode = false;
let dpCurrentSignature = null;

function toggleProfMode() {
  professorMode = !professorMode;
  const btn = document.getElementById('profModeBtn');
  if (btn) { btn.classList.toggle('active', professorMode); btn.textContent = professorMode ? '🎓 교수님 모드 ON' : '🎓 교수님 모드'; }
  dpApplyProfMode();
  showToast(professorMode ? '교수님 모드 ON' : '교수님 모드 OFF');
}
function dpApplyProfMode() {
  document.body.classList.toggle('prof-mode-active', professorMode);
  const banner = document.querySelector('.prof-mode-banner');
  if (banner) banner.classList.toggle('show', professorMode);
}
function dpSaveComment(cellId) {
  const ta = document.getElementById('dp-cta-' + cellId);
  if (!ta) return;
  const text = ta.value.trim();
  if (!text) return;
  dpAddCommentToList(cellId, text);
  ta.value = ''; ta.style.height = '44px';
  saveCurrentState(false);
}
function dpAddCommentToList(cellId, text) {
  const list = document.getElementById('dp-clist-' + cellId);
  if (!list) return;
  const item = document.createElement('div');
  item.className = 'comment-item';
  const span = document.createElement('span');
  span.className = 'comment-item-text';
  span.textContent = text;
  const btn = document.createElement('button');
  btn.className = 'comment-del-btn';
  btn.textContent = '✕';
  btn.title = '삭제';
  btn.onclick = () => {
    if (!confirm('이 코멘트를 삭제할까요?')) return;
    item.remove();
    saveCurrentState(false);
  };
  item.appendChild(span);
  item.appendChild(btn);
  list.appendChild(item);
}
function dpGetCurrentComments() {
  const r = {};
  ['directive','tasks','tomorrow','pending'].forEach(id => {
    const list = document.getElementById('dp-clist-' + id);
    r[id] = list ? Array.from(list.querySelectorAll('.comment-item-text')).map(el => el.textContent) : [];
  });
  return r;
}
let dpSigCtx = null, dpSigDrawing = false, dpSigHasContent = false, dpSigTab = 'draw';
function dpOpenSigModal() {
  document.getElementById('dp-sigOverlay').classList.add('show');
  document.getElementById('dp-sigModal').classList.add('show');
  dpInitCanvas();
  if (dpCurrentSignature && dpCurrentSignature.type === 'name') { document.getElementById('dp-sigNameInp').value = dpCurrentSignature.data || ''; dpSwitchTab('name'); }
  else dpSwitchTab('draw');
}
function dpCloseSigModal() { document.getElementById('dp-sigOverlay').classList.remove('show'); document.getElementById('dp-sigModal').classList.remove('show'); }
function dpSwitchTab(tab) {
  dpSigTab = tab;
  ['Draw','Name'].forEach(t => {
    document.getElementById('dp-tab'+t).classList.toggle('active', tab === t.toLowerCase());
    document.getElementById('dp-panel'+t).classList.toggle('active', tab === t.toLowerCase());
  });
}
function dpInitCanvas() {
  const canvas = document.getElementById('dp-sigCanvas');
  if (!canvas) return;
  dpSigCtx = canvas.getContext('2d');
  dpSigCtx.clearRect(0, 0, canvas.width, canvas.height);
  dpSigHasContent = false;
  dpSigCtx.strokeStyle = '#c0392b'; dpSigCtx.lineWidth = 3; dpSigCtx.lineCap = 'round'; dpSigCtx.lineJoin = 'round';
  function getPos(e) { const rect = canvas.getBoundingClientRect(); const sx = canvas.width/rect.width, sy = canvas.height/rect.height; const cx = e.touches ? e.touches[0].clientX : e.clientX; const cy = e.touches ? e.touches[0].clientY : e.clientY; return {x:(cx-rect.left)*sx, y:(cy-rect.top)*sy}; }
  canvas.onmousedown = canvas.ontouchstart = (e) => { e.preventDefault(); dpSigDrawing=true; dpSigHasContent=true; const p=getPos(e); dpSigCtx.beginPath(); dpSigCtx.moveTo(p.x,p.y); };
  canvas.onmousemove = canvas.ontouchmove = (e) => { e.preventDefault(); if(!dpSigDrawing)return; const p=getPos(e); dpSigCtx.lineTo(p.x,p.y); dpSigCtx.stroke(); };
  canvas.onmouseup = canvas.onmouseleave = canvas.ontouchend = () => { dpSigDrawing=false; };
}
function dpClearSig() {
  if (dpSigTab==='draw') { const c=document.getElementById('dp-sigCanvas'); if(c&&dpSigCtx){dpSigCtx.clearRect(0,0,c.width,c.height);dpSigHasContent=false;} }
  else { const i=document.getElementById('dp-sigNameInp'); if(i) i.value=''; }
}
function dpConfirmSig() {
  const today = new Date();
  const d = today.getFullYear()+'.'+String(today.getMonth()+1).padStart(2,'0')+'.'+String(today.getDate()).padStart(2,'0');
  if (dpSigTab==='draw') {
    if (!dpSigHasContent) { showToast('서명을 그려주세요.',true); return; }
    dpCurrentSignature = {type:'draw', data:document.getElementById('dp-sigCanvas').toDataURL('image/png'), date:d};
  } else {
    const name = document.getElementById('dp-sigNameInp').value.trim();
    if (!name) { showToast('성함을 입력해주세요.',true); return; }
    dpCurrentSignature = {type:'name', data:name, date:d};
  }
  dpRenderSigDisplay(); dpCloseSigModal(); saveCurrentState(false); showToast('확인 서명이 저장되었습니다 ✓');
}
function dpClearSigData() {
  if (!dpCurrentSignature) return;
  if (!confirm('서명을 삭제할까요?')) return;
  dpCurrentSignature = null; dpRenderSigDisplay(); saveCurrentState(false);
}
function dpRenderSigDisplay() {
  const el = document.getElementById('dp-sigDisplay');
  const badge = document.getElementById('dp-headerSig');
  const section = document.querySelector('.signature-section');
  if (!el) return;
  if (!dpCurrentSignature) {
    el.innerHTML = '<span class="sig-pending">서명 없음</span>';
    if (badge) badge.classList.remove('show');
    if (section) section.classList.remove('has-signature');
    return;
  }
  const sig = dpCurrentSignature;
  const stampHtml = sig.type === 'draw'
    ? `<div class="sig-stamp"><span class="stamp-confirmed">확 인</span><img src="${sig.data}" alt="서명"><span class="stamp-date">${sig.date}</span></div>`
    : `<div class="sig-stamp"><span class="stamp-confirmed">확 인</span><span class="stamp-name">${sig.data}</span><span class="stamp-date">${sig.date}</span></div>`;
  el.innerHTML = stampHtml;
  if (badge) { badge.textContent = '✓ 확인됨'; badge.classList.add('show'); }
  if (section) section.classList.add('has-signature');
}

init();
</script>
