<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 / 연구 일지 — BMD팀</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

  :root {
    --bg: #ffffff;
    --sidebar-bg: #f7f7f5;
    --border: #e8e8e5;
    --text: #37352f;
    --text-muted: #9b9a97;
    --text-light: #b7b6b3;
    --accent: #2f80ed;
    --accent-hover: #1a6fd4;
    --tag-bg: #e8f0fe;
    --tag-text: #2f80ed;
    --row-hover: #f7f7f5;
    --danger: #eb5757;
    --success: #0f7b6c;
    --font: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  }

  body {
    font-family: var(--font);
    background: #f7f6f3;
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Layout ── */
  .app-layout {
    display: flex;
    align-items: flex-start;
    min-height: 100vh;
  }

  .main-wrap {
    flex: 1;
    min-width: 0;
    padding: 40px 20px 80px;
  }

  .page {
    max-width: 900px;
    margin: 0 auto;
    background: var(--bg);
    border-radius: 4px;
    padding: 60px 72px;
    box-shadow: rgba(15,15,15,.05) 0px 0px 0px 1px, rgba(15,15,15,.1) 0px 3px 6px;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 240px;
    min-width: 240px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    align-self: flex-start;
    height: 100vh;
    overflow: hidden;
  }

  .sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 14px 10px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .sidebar-add-team {
    border: none;
    background: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 12px;
    font-family: var(--font);
    padding: 3px 7px;
    border-radius: 4px;
    transition: background 0.1s, color 0.1s;
  }
  .sidebar-add-team:hover { background: rgba(0,0,0,0.06); color: var(--text); }

  .sidebar-items {
    flex: 1;
    overflow-y: auto;
    padding: 8px 6px 12px;
  }

  .team-group { margin-bottom: 2px; }

  .team-row {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 6px;
    border-radius: 5px;
    cursor: pointer;
  }
  .team-row:hover { background: rgba(0,0,0,0.06); }
  .team-row:hover .team-action { opacity: 1; }
  .team-chevron {
    width: 13px;
    flex-shrink: 0;
    color: var(--text-muted);
    font-size: 9px;
    display: flex;
    justify-content: center;
    transition: transform 0.15s;
  }
  .team-group.collapsed .team-chevron { transform: rotate(-90deg); }
  .team-dot { width: 6px; height: 6px; border-radius: 2px; background: var(--text-light); flex-shrink: 0; }
  .team-name-input {
    flex: 1;
    min-width: 0;
    border: none;
    background: transparent;
    outline: none;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .team-action {
    border: none;
    background: none;
    cursor: pointer;
    color: var(--text-light);
    font-size: 12px;
    padding: 2px 5px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
  }
  .team-action:hover { color: var(--danger); }

  .member-list { list-style: none; overflow: hidden; }
  .team-group.collapsed .member-list,
  .team-group.collapsed .add-person-btn { display: none; }

  .person-row {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 6px 6px 25px;
    border-radius: 5px;
    cursor: pointer;
  }
  .person-row:hover { background: rgba(0,0,0,0.06); }
  .person-row:hover .person-action { opacity: 1; }
  .person-row.active { background: var(--tag-bg); }
  .person-row.active .person-name-input { color: var(--accent); font-weight: 600; }
  .person-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text-light);
    flex-shrink: 0;
  }
  .person-row.active .person-dot { background: var(--accent); }
  .person-name-input {
    flex: 0 1 auto;
    width: 110px;
    min-width: 0;
    border: none;
    background: transparent;
    outline: none;
    font-family: var(--font);
    font-size: 13px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .person-spacer {
    flex: 1;
    align-self: stretch;
    min-width: 8px;
    cursor: pointer;
  }
  .person-action {
    border: none;
    background: none;
    cursor: pointer;
    color: var(--text-light);
    font-size: 11px;
    padding: 2px 5px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
  }
  .person-action:hover { color: var(--danger); }

  .add-person-btn {
    display: block;
    width: 100%;
    text-align: left;
    padding: 5px 6px 8px 25px;
    border: none;
    background: none;
    cursor: pointer;
    color: var(--text-light);
    font-size: 12px;
    font-family: var(--font);
    transition: color 0.15s;
  }
  .add-person-btn:hover { color: var(--text-muted); }

  .sidebar-empty {
    padding: 10px 8px;
    font-size: 12.5px;
    color: var(--text-muted);
  }

  /* ── Buttons (bottom action row, like WeeklyPlan) ── */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 32px;
    justify-content: flex-end;
  }
  .btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 4px;
    font-size: 14px;
    font-family: var(--font);
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s;
    border: none;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary {
    background: #f0efee;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: #e3e2df; }

  /* Date navigator (top-right of content, like WeeklyPlan's week-nav) */
  .date-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    column-gap: 12px;
    margin-bottom: 28px;
  }
  .date-nav-left {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    min-width: 0;
    max-width: 100%;
  }
  .date-nav-label {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 500;
    max-width: 100%;
    overflow-wrap: break-word;
  }
  .date-nav-label .today-badge {
    display: inline-block;
    margin-left: 8px;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 600;
    background: var(--tag-bg);
    color: var(--tag-text);
    vertical-align: middle;
  }
  .search-trigger-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 12.5px;
    font-family: var(--font);
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
    transition: background 0.12s;
  }
  .search-trigger-btn:hover { background: var(--row-hover); }
  .nav-group { display: flex; gap: 6px; }
  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 13px;
    font-family: var(--font);
    display: flex;
    align-items: center;
    gap: 4px;
    transition: background 0.12s;
  }
  .nav-btn:hover { background: var(--row-hover); }
  .date-picker {
    color: var(--text);
    font-size: 13px;
    padding: 4px 8px;
  }
  .date-picker::-webkit-calendar-picker-indicator {
    cursor: pointer;
    opacity: 0.6;
  }

  .page-title-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  .page-emoji { font-size: 36px; }

  .page-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    border: none;
    outline: none;
    background: transparent;
    font-family: var(--font);
    width: 100%;
    padding: 2px 0;
  }

  /* Meta row — unified with WeeklyPlan's 소속 / 담당자 design */
  .page-meta {
    display: grid;
    grid-template-columns: 230px 230px 1fr;
    column-gap: 12px;
    margin-bottom: 28px;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--text-muted);
    min-width: 0;
  }

  .meta-label { font-weight: 500; color: var(--text); min-width: 60px; flex-shrink: 0; }

  .meta-input {
    border: none;
    outline: none;
    background: transparent;
    font-size: 14px;
    color: var(--text);
    font-family: var(--font);
    border-bottom: 1px dashed var(--border);
    padding-bottom: 1px;
    min-width: 120px;
  }
  .meta-input:focus { border-bottom-color: var(--accent); }

  .meta-text {
    font-size: 14px;
    color: var(--text);
    padding-bottom: 1px;
  }

  /* SNS 현황 — same 3-column grid as page-meta, so the two rows line up */
  .sns-bar {
    display: grid;
    grid-template-columns: 230px 230px 1fr;
    column-gap: 12px;
    margin-bottom: 28px;
  }

  .sns-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12.5px;
    font-weight: 500;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
  }

  .sns-tag.youtube { background: #fff0f0; color: #c0392b; }
  .sns-tag.instagram { background: #fff4f9; color: #c2185b; }
  .sns-tag.blog { background: #f0f4ff; color: #3a57e8; }

  .sns-tag input {
    background: transparent;
    border: none;
    outline: none;
    font-size: 12.5px;
    font-family: var(--font);
    color: inherit;
    width: 52px;
    height: 18px;
    line-height: 18px;
    padding: 0;
    margin: 0;
    -webkit-appearance: none;
    appearance: none;
    align-self: center;
    flex: 0 0 auto;
    font-weight: 600;
  }
  .sns-tag input:last-of-type { width: 40px; margin-right: 12px; }
  .sns-tag input:first-of-type { text-align: right; margin-left: auto; }
  /* 글자(/)가 아닌 작은 선으로 그려서, 폰트별 글리프 위치 차이로 인한 세로 어긋남을 원천적으로 없앰.
     숫자 글자의 cap-height에 맞춘 짧은 직선이라 어느 각도로 봐도 가운데로 보임 */
  .sns-tag .sns-slash {
    display: inline-block;
    width: 1.3px;
    height: 9.5px;
    background: currentColor;
    opacity: .4;
    transform: rotate(18deg);
    flex-shrink: 0;
    align-self: center;
    margin: 0 3px;
  }

  /* ── Table ── */
  .section-label {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
    margin-top: 28px;
  }

  .journal-table {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .table-row {
    display: grid;
    grid-template-columns: 110px 1fr 140px;
    border-bottom: 1px solid #dadad6;
    min-height: 44px;
    transition: background 0.1s;
  }
  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: var(--row-hover); }

  .table-row.header-row {
    background: var(--sidebar-bg);
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }
  .table-row.header-row:hover { background: var(--sidebar-bg); }

  .table-cell {
    padding: 10px 14px;
    border-right: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
  }
  .table-cell:last-child { border-right: none; }

  /* 구분 column (label cells) — same background as the header row, centered */
  .table-cell:first-child {
    background: var(--sidebar-bg);
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .cell-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    padding-top: 1px;
  }

  .cell-input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--font);
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.6;
    resize: none;
    min-height: 24px;
    padding: 0;
  }

  .cell-input::placeholder { color: var(--text-light); }

  .cell-input-small {
    font-size: 12.5px;
    color: var(--text-muted);
  }

  /* ── Notice bar ── */
  .notice-bar {
    margin-top: 28px;
    padding: 12px 16px;
    background: #fffbf0;
    border: 1px solid #f0e0a0;
    border-radius: 8px;
    font-size: 12.5px;
    color: #7a6000;
    line-height: 1.7;
  }

  .notice-bar strong { font-weight: 600; }

  /* ── Divider ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

  /* Checklist items in cell */
  .checklist { list-style: none; padding: 0; }
  .check-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 2px 0;
    font-size: 13.5px;
    line-height: 1.6;
  }
  .check-item input[type="checkbox"] {
    margin-top: 3px; flex-shrink: 0;
    width: 14px; height: 14px;
    cursor: pointer;
    accent-color: var(--accent);
  }
  .check-item span { flex: 1; }
  .check-item span.done { text-decoration: line-through; color: var(--text-muted); }

  /* Tag in 비고 */
  .stat-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
    background: var(--tag-bg);
    color: var(--tag-text);
    margin: 2px 2px 2px 0;
    white-space: nowrap;
  }

  /* ── Content search modal ── */
  .search-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,15,15,.45);
    z-index: 90;
  }
  .search-modal-overlay.show { display: block; }

  .search-modal {
    display: none;
    flex-direction: column;
    position: fixed;
    top: 8%;
    left: 50%;
    transform: translateX(-50%);
    width: 92%;
    max-width: 480px;
    max-height: 78vh;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 12px 40px rgba(0,0,0,.25);
    z-index: 91;
    overflow: hidden;
  }
  .search-modal.show { display: flex; }

  .search-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 14px;
  }
  .search-modal-close {
    border: none;
    background: none;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-muted);
    padding: 2px 6px;
  }
  .search-modal-close:hover { color: var(--text); }

  .search-modal-body {
    display: flex;
    gap: 8px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .search-input {
    flex: 1;
    min-width: 0;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    font-family: var(--font);
    outline: none;
    color: var(--text);
  }
  .search-input:focus { border-color: var(--accent); }
  .search-run-btn { padding: 8px 14px; font-size: 13px; flex-shrink: 0; }

  .search-results {
    overflow-y: auto;
    padding: 6px 8px 14px;
  }
  .search-empty {
    padding: 30px 10px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
  }
  .search-result-item {
    padding: 10px 10px;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 2px;
  }
  .search-result-item:hover { background: var(--row-hover); }
  .search-result-date {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 3px;
  }
  .search-result-snippet {
    font-size: 12.5px;
    color: var(--text);
    line-height: 1.5;
    word-break: break-word;
  }
  .search-result-snippet mark {
    background: #fff3a0;
    color: inherit;
    border-radius: 2px;
    padding: 0 1px;
  }

  /* PDF export (mobile "save as PDF") — hide chrome while capturing */
  .pdf-export .btn-row,
  .pdf-export .date-nav .nav-group,
  .pdf-export .search-trigger-btn,
  .pdf-export .sidebar,
  .pdf-export .sidebar-toggle {
    display: none !important;
  }

  /* PDF export — force the desktop layout regardless of actual screen width.
     (html2canvas's windowWidth option doesn't reliably re-evaluate the mobile
     @media rules in this pipeline, so the mobile-only rules — column stacking,
     hidden 비고 column, etc. — must be overridden explicitly here instead.) */
  .page.pdf-export { padding: 60px 72px !important; }
  .pdf-export .page-title { font-size: 28px !important; }
  .pdf-export .page-meta {
    display: grid !important;
    grid-template-columns: 230px 230px 1fr !important;
    column-gap: 12px !important;
  }
  .pdf-export .sns-bar {
    display: grid !important;
    grid-template-columns: repeat(3, 1fr) !important;
    column-gap: 12px !important;
  }
  .pdf-export .sns-tag { white-space: nowrap !important; }
  .pdf-export .date-nav {
    flex-direction: row !important;
    align-items: center !important;
  }
  .pdf-export .date-nav-left { width: auto !important; }
  .pdf-export .table-row {
    grid-template-columns: 110px 1fr 140px !important;
  }
  .pdf-export .table-row .table-cell:last-child,
  .pdf-export .table-row.header-row .table-cell:last-child {
    display: flex !important;
  }
  .pdf-export .table-cell { padding: 10px 14px !important; }
  .pdf-export .cell-label { font-size: 13px !important; }
  .pdf-export .cell-input { font-size: 13.5px !important; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .big-emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Mobile ── */
  .sidebar-toggle, .sidebar-overlay { display: none; }

  @media (max-width: 880px) {
    .app-layout { display: block; }
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      width: 270px;
      max-width: 82vw;
      z-index: 50;
      transform: translateX(-100%);
      transition: transform 0.2s ease;
      box-shadow: 2px 0 16px rgba(0,0,0,.15);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,15,15,.35);
      z-index: 40;
    }
    .sidebar-overlay.show { display: block; }
    .sidebar-toggle {
      display: flex;
      position: fixed;
      top: 14px; left: 14px;
      z-index: 45;
      align-items: center;
      gap: 6px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      font-family: var(--font);
      color: var(--text);
      box-shadow: 0 1px 6px rgba(0,0,0,.1);
    }
    .main-wrap { padding-top: 68px; }
  }

  @media (max-width: 600px) {
    .main-wrap { padding: 60px 8px 60px; }
    .page { padding: 20px 14px; }
    .page-title { font-size: 22px; }

    /* meta: 세로 */
    .page-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }

    /* SNS 바: 세로 */
    .sns-bar {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 18px;
    }
    .sns-tag { white-space: normal; }

    /* date nav */
    .date-nav {
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 18px;
    }
    .date-nav-left {
      width: 100%;
      justify-content: space-between;
    }
    .nav-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      width: 100%;
    }
    .nav-group input[type="date"].nav-btn {
      grid-column: 1 / -1;
      width: 100%;
    }

    /* 테이블 3열 → 2열 (비고 숨김) */
    .table-row {
      grid-template-columns: 90px 1fr;
    }
    .table-row .table-cell:last-child {
      display: none;
    }
    .table-row.header-row .table-cell:last-child {
      display: none;
    }
    .table-cell { padding: 8px 10px; }
    .cell-label { font-size: 12px; }
    .cell-input { font-size: 13px; }

    /* 버튼 행 */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 20px;
      justify-content: initial;
    }
    .btn { font-size: 13px; padding: 8px 10px; justify-content: center; }
  }

  /* ── Print ── */
  @media print {
    .sidebar, .date-nav .nav-group, .btn-row, .search-trigger-btn, .search-modal, .search-modal-overlay {
      display: none !important;
    }
    body { background: #fff; }
    .app-layout { display: block; }
    .main-wrap { padding: 0; }
    .page { max-width: 100%; box-shadow: none; border-radius: 0; padding: 16px 8px; margin: 0; }
    .journal-table { border: 1px solid #ccc; }
    .table-row { border-bottom: 1px solid #ccc !important; break-inside: avoid; }
    .table-cell { border-right: 1px solid #ccc !important; }

    /* keep SNS tags aligned with the meta row in print too */
    .page-meta, .sns-bar { grid-template-columns: repeat(3, 1fr); column-gap: 8px; }
    .sns-tag {
      padding: 4px 8px;
      font-size: 11px;
    }
    .sns-tag input { min-width: 0; }
  }
</style>
</head>
<body>
<div class="app-layout">

<!-- Mobile sidebar toggle -->
<button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰ 팀 목록</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- ════════════ 업무일지 내용 검색 모달 ════════════ -->
<div class="search-modal-overlay" id="searchModalOverlay" onclick="closeSearchModal()"></div>
<div class="search-modal" id="searchModal">
  <div class="search-modal-header">
    <span>🔍 업무일지 내용 검색</span>
    <button class="search-modal-close" onclick="closeSearchModal()">✕</button>
  </div>
  <div class="search-modal-body">
    <input type="text" id="searchInput" class="search-input" placeholder="검색할 내용을 입력하세요" autocomplete="off">
    <button class="btn btn-primary search-run-btn" onclick="runSearch()">검색</button>
  </div>
  <div class="search-results" id="searchResults">
    <div class="search-empty">검색어를 입력하세요.</div>
  </div>
</div>

<!-- ════════════ SIDEBAR (2-depth: 팀 ▸ 구성원) ════════════ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-title">팀 / 구성원</span>
    <button class="sidebar-add-team" onclick="addTeam()">+ 팀 추가</button>
  </div>
  <div class="sidebar-items">
    <div id="sidebarTree"></div>
  </div>
</aside>

<!-- ════════════ MAIN ════════════ -->
<div class="main-wrap">
  <div class="page">

    <!-- Date Navigator -->
    <div class="date-nav">
      <div class="date-nav-left">
        <div class="date-nav-label" id="dateNavLabel">—</div>
        <button class="search-trigger-btn" onclick="openSearchModal()" title="업무일지 내용 검색">🔍 내용 검색</button>
      </div>
      <div class="nav-group">
        <button class="nav-btn" onclick="changeDate(-1)">← 이전</button>
        <input type="date" class="nav-btn date-picker" id="dateNavPicker" onchange="jumpToDate(this.value)">
        <button class="nav-btn" onclick="goToToday()">오늘</button>
        <button class="nav-btn" onclick="changeDate(1)">다음 →</button>
      </div>
    </div>

    <div id="entryContent">
      <div class="empty-state">
        <div class="big-emoji">📄</div>
        <p>왼쪽에서 팀과 구성원을 선택하세요.</p>
      </div>
    </div>

    <!-- Actions -->
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="clearCurrent()">🗑 초기화</button>
      <button class="btn btn-secondary" onclick="printPlan()">🖨 인쇄</button>
      <button class="btn btn-primary" onclick="saveEntry()">💾 저장</button>
    </div>

  </div>
</div>

</div>


<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<!-- html2pdf.js: 모바일에서 인쇄 버튼을 눌렀을 때 PDF로 직접 저장하기 위함 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>

<script>
// ══════════════════════════════════════
//  Constants
// ══════════════════════════════════════
const DAY_KO = ['일','월','화','수','목','금','토'];

const DEFAULT_TEAMS = [
  { id: 't1', name: 'BMD팀', members: [
      { id: 'p1', name: '임수연PD' }
  ]},
  { id: 't2', name: '기술팀', members: [

  ]}
];

// Sample journal content seeded once, for BMD팀 · 임수연PD on 2026-06-19
const DEMO_PERSON_ID = 'p1';
const DEMO_DATE_ID = '260619';
const DEMO_DATA = {
  manager: '임수연PD',
  yt: '20,526', yt_sub: '215',
  ig: '5,519',  ig_sub: '829',
  blog: '',     blog_sub: '',
  directive: '차주 카드뉴스 : 한국 수자원공사 K-Water 수련원\n명함 디자인\n네이버 플레이스 등록',
  directive_note: '',
  tasks: '【업무회의】\n1. 전원속의 내집 카드뉴스로(화요일 발행)\n2. 전문성을 매출로 연결하기 → 카드뉴스 해시태그에 두꺼비프로젝트, 헌집을새집으로 두개 추가하기\n3. 셀인카페 활동을 우선순위로\n\n- YT-S4-001 롱폼 편집 → 진행률 : 10%\n- 회사 도메인 이메일 생성(네이버 웍스) 및 호스팅 변경 완료\n- 영상 055-5 유튜브, 인스타그램 업로드\n- 홈페이지 전원속의 내집 업로드\n- 홈페이지 안심번호 수정, 로고 수정\n- 블로그 로고 수정',
  tasks_note: '',
  tomorrow: '- YT-S4-001 롱폼 편집',
  tomorrow_note: '',
  pending: '',
  pending_note: '',
};

const TEAMS_KEY = 'dp_teams_v1';
const SELECTED_KEY = 'dp_selected_v1';
function entryKey(personId, dateId) { return `dp_entry_${personId}_${dateId}`; }

// ══════════════════════════════════════
//  State
// ══════════════════════════════════════
let TEAMS = [];
let selectedPersonId = null;
let currentDayOffset = 0; // relative to today
const collapsedTeams = new Set();

// ══════════════════════════════════════
//  Storage helpers (Firebase Firestore)
// ══════════════════════════════════════
const _firebaseConfig = {
  apiKey: "AIzaSyC4sYx0-60NVCK2MI9z8cKpKUry4R_bLgM",
  authDomain: "work-planner-62897.firebaseapp.com",
  projectId: "work-planner-62897",
  storageBucket: "work-planner-62897.firebasestorage.app",
  messagingSenderId: "199105250426",
  appId: "1:199105250426:web:6cf9f54c659cf5950a67c3"
};
let _db = null;
function getDb() {
  if (_db) return _db;
  if (!firebase.apps.length) firebase.initializeApp(_firebaseConfig);
  _db = firebase.firestore();
  return _db;
}
const FS_COL = 'dp_store';

async function storeGet(key) {
  try { const snap = await getDb().collection(FS_COL).doc(key).get(); return snap.exists ? snap.data().v : null; }
  catch(e) { return null; }
}
async function storeSet(key, value) {
  try { await getDb().collection(FS_COL).doc(key).set({ v: value }); return true; }
  catch(e) { console.error(e); return false; }
}
async function storeDelete(key) {
  try { await getDb().collection(FS_COL).doc(key).delete(); } catch(e) {}
}
async function storeList(prefix) {
  try {
    const snap = await getDb().collection(FS_COL)
      .where(firebase.firestore.FieldPath.documentId(), '>=', prefix)
      .where(firebase.firestore.FieldPath.documentId(), '<', prefix + '\uf8ff')
      .get();
    return snap.docs.map(d => d.id);
  } catch(e) { return []; }
}

function uid(prefix) { return prefix + '_' + Math.random().toString(36).slice(2, 9); }
function escapeAttr(str) { return String(str ?? '').replace(/&/g, '&amp;').replace(/"/g, '&quot;'); }
function esc(s='') { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function findPerson(personId) {
  for (const team of TEAMS) {
    const m = team.members.find(m => m.id === personId);
    if (m) return { team, person: m };
  }
  return null;
}

// ══════════════════════════════════════
//  Date helpers
// ══════════════════════════════════════
function dateForOffset(offset) {
  const d = new Date();
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + offset);
  return d;
}
function dateId(d) {
  const y = String(d.getFullYear()).slice(2);
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}${m}${day}`;
}
function dateDisplay(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}.${m}.${day} (${DAY_KO[d.getDay()]})`;
}
// yyyy-mm-dd (local) for <input type="date"> value
function toInputValue(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
// integer day-count between two midnight Date objects (DST-safe)
function dayDiff(a, b) {
  const utcA = Date.UTC(a.getFullYear(), a.getMonth(), a.getDate());
  const utcB = Date.UTC(b.getFullYear(), b.getMonth(), b.getDate());
  return Math.round((utcB - utcA) / 86400000);
}

function renderDateNav() {
  const d = dateForOffset(currentDayOffset);
  const badge = currentDayOffset === 0 ? '<span class="today-badge">오늘</span>' : '';
  document.getElementById('dateNavLabel').innerHTML = dateDisplay(d) + badge;
  const picker = document.getElementById('dateNavPicker');
  if (picker) picker.value = toInputValue(d);
}

async function changeDate(dir) {
  await saveCurrentState(true);
  currentDayOffset += dir;
  renderDateNav();
  await loadPersonDate();
}

async function jumpToDate(value) {
  if (!value) return; // empty/cleared input — ignore
  const [y, m, day] = value.split('-').map(Number);
  const target = new Date(y, m - 1, day);
  target.setHours(0,0,0,0);
  const today = new Date();
  today.setHours(0,0,0,0);
  await saveCurrentState(true);
  currentDayOffset = dayDiff(today, target);
  renderDateNav();
  await loadPersonDate();
}

async function goToToday() {
  if (currentDayOffset === 0) return;
  await saveCurrentState(true);
  currentDayOffset = 0;
  renderDateNav();
  await loadPersonDate();
}

// ══════════════════════════════════════
//  Teams / sidebar persistence
// ══════════════════════════════════════
async function loadTeams() {
  const raw = await storeGet(TEAMS_KEY);
  if (raw) { try { return JSON.parse(raw); } catch(e) {} }
  return JSON.parse(JSON.stringify(DEFAULT_TEAMS));
}
function persistTeams() { storeSet(TEAMS_KEY, JSON.stringify(TEAMS)); }

async function seedDemoIfNeeded() {
  if (!findPerson(DEMO_PERSON_ID)) return;
  const existing = await storeGet(entryKey(DEMO_PERSON_ID, DEMO_DATE_ID));
  if (!existing) await storeSet(entryKey(DEMO_PERSON_ID, DEMO_DATE_ID), JSON.stringify(DEMO_DATA));
}

async function cleanupPersonEntries(personId) {
  const keys = await storeList(`dp_entry_${personId}_`);
  for (const k of keys) { await storeDelete(k); }
}

// ══════════════════════════════════════
//  Sidebar (teams / members, 2-depth)
// ══════════════════════════════════════
function renderSidebar() {
  const tree = document.getElementById('sidebarTree');
  tree.innerHTML = '';

  if (TEAMS.length === 0) {
    tree.innerHTML = '<div class="sidebar-empty">팀이 없습니다. "+ 팀 추가"로 시작하세요.</div>';
    return;
  }

  TEAMS.forEach(team => {
    const group = document.createElement('div');
    group.className = 'team-group' + (collapsedTeams.has(team.id) ? ' collapsed' : '');

    const row = document.createElement('div');
    row.className = 'team-row';
    row.dataset.teamId = team.id;
    row.innerHTML = `
      <span class="team-chevron">▾</span>
      <span class="team-dot"></span>
      <input class="team-name-input" value="${escapeAttr(team.name)}" />
      <button class="team-action" title="팀 삭제">✕</button>
    `;
    const nameInput = row.querySelector('.team-name-input');
    const removeBtn = row.querySelector('.team-action');

    row.addEventListener('click', () => toggleTeam(team.id));
    nameInput.addEventListener('click', (e) => e.stopPropagation());
    nameInput.addEventListener('input', () => {
      team.name = nameInput.value;
      persistTeams();
      if (team.members.some(m => m.id === selectedPersonId)) updateBreadcrumb();
      const teamEl = document.getElementById('metaTeam');
      if (teamEl && team.members.some(m => m.id === selectedPersonId)) teamEl.textContent = team.name;
    });
    nameInput.addEventListener('keydown', (e) => {
      // e.isComposing / keyCode 229: 한글 등 IME 조합 중 Enter는 무시 (마지막 글자 중복 입력 방지)
      if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) { e.preventDefault(); nameInput.blur(); }
    });
    removeBtn.addEventListener('click', (e) => { e.stopPropagation(); removeTeam(team.id); });

    group.appendChild(row);

    const list = document.createElement('ul');
    list.className = 'member-list';
    team.members.forEach(person => {
      const li = document.createElement('li');
      const pRow = document.createElement('div');
      pRow.className = 'person-row' + (person.id === selectedPersonId ? ' active' : '');
      pRow.dataset.personId = person.id;
      pRow.innerHTML = `
        <span class="person-dot"></span>
        <input class="person-name-input" value="${escapeAttr(person.name)}" />
        <span class="person-spacer" title="선택하고 일지 보기"></span>
        <button class="person-action" title="구성원 삭제">✕</button>
      `;
      const pInput = pRow.querySelector('.person-name-input');
      const pSpacer = pRow.querySelector('.person-spacer');
      const pRemove = pRow.querySelector('.person-action');

      pRow.addEventListener('click', () => selectPerson(person.id));
      // 이름(텍스트) 클릭 → 이름 변경 모드로만 진입 (모바일 사이드바는 닫지 않음)
      pInput.addEventListener('click', (e) => { e.stopPropagation(); selectPerson(person.id, false, true); });
      // 이름 오른쪽 빈 공간 클릭 → 선택 + 모바일 사이드바 접고 일지 보기
      pSpacer.addEventListener('click', (e) => { e.stopPropagation(); selectPerson(person.id); });
      pInput.addEventListener('input', () => {
        person.name = pInput.value;
        persistTeams();
        if (person.id === selectedPersonId) {
          updateBreadcrumb();
          const managerEl = document.getElementById('metaManager');
          if (managerEl) managerEl.textContent = person.name;
        }
      });
      pInput.addEventListener('keydown', (e) => {
        // e.isComposing / keyCode 229: 한글 등 IME 조합 중 Enter는 무시 (마지막 글자 중복 입력 방지)
        if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) { e.preventDefault(); pInput.blur(); closeSidebarMobile(); }
      });
      pRemove.addEventListener('click', (e) => { e.stopPropagation(); removeMember(team.id, person.id); });

      li.appendChild(pRow);
      list.appendChild(li);
    });
    group.appendChild(list);

    const addPersonBtn = document.createElement('button');
    addPersonBtn.className = 'add-person-btn';
    addPersonBtn.textContent = '+ 구성원 추가';
    addPersonBtn.addEventListener('click', (e) => { e.stopPropagation(); addMember(team.id); });
    group.appendChild(addPersonBtn);

    tree.appendChild(group);
  });
}

function toggleTeam(teamId) {
  if (collapsedTeams.has(teamId)) collapsedTeams.delete(teamId);
  else collapsedTeams.add(teamId);
  renderSidebar();
}

function addTeam() {
  const team = { id: uid('t'), name: '새 팀', members: [] };
  TEAMS.push(team);
  persistTeams();
  renderSidebar();
  requestAnimationFrame(() => {
    const el = document.querySelector(`.team-row[data-team-id="${team.id}"] .team-name-input`);
    if (el) { el.focus(); el.select(); }
  });
}

async function removeTeam(teamId) {
  const team = TEAMS.find(t => t.id === teamId);
  if (!team) return;
  if (!confirm(`'${team.name}' 팀을 삭제할까요? 구성원과 저장된 일지도 함께 제거됩니다.`)) return;

  for (const m of team.members) { await cleanupPersonEntries(m.id); }
  TEAMS = TEAMS.filter(t => t.id !== teamId);
  persistTeams();

  if (team.members.some(m => m.id === selectedPersonId)) {
    selectedPersonId = TEAMS[0]?.members[0]?.id ?? null;
    storeSet(SELECTED_KEY, selectedPersonId || '');
    await loadPersonDate();
  }
  renderSidebar();
}

async function addMember(teamId) {
  const team = TEAMS.find(t => t.id === teamId);
  if (!team) return;
  const person = { id: uid('p'), name: '새 구성원' };
  team.members.push(person);
  persistTeams();
  // skipMobileClose=true: 새 구성원 이름을 입력하는 동안 모바일 사이드바가 닫히지 않도록 유지
  await selectPerson(person.id, true, true);
  requestAnimationFrame(() => {
    const el = document.querySelector(`.person-row[data-person-id="${person.id}"] .person-name-input`);
    if (el) { el.focus(); el.select(); }
  });
}

async function removeMember(teamId, personId) {
  const team = TEAMS.find(t => t.id === teamId);
  if (!team) return;
  if (!confirm('이 구성원을 삭제할까요? 저장된 일지도 함께 제거됩니다.')) return;

  team.members = team.members.filter(m => m.id !== personId);
  persistTeams();
  await cleanupPersonEntries(personId);

  if (selectedPersonId === personId) {
    selectedPersonId = team.members[0]?.id ?? TEAMS.flatMap(t => t.members)[0]?.id ?? null;
    storeSet(SELECTED_KEY, selectedPersonId || '');
    await loadPersonDate();
  }
  renderSidebar();
}

async function selectPerson(personId, skipSave, skipMobileClose) {
  if (personId === selectedPersonId) { if (!skipMobileClose) closeSidebarMobile(); return; }
  if (!skipSave) await saveCurrentState(true);
  selectedPersonId = personId;
  storeSet(SELECTED_KEY, personId || '');
  renderSidebar();
  await loadPersonDate();
  if (!skipMobileClose) closeSidebarMobile();
}

function updateBreadcrumb() {
  const found = findPerson(selectedPersonId);
  const el = document.getElementById('topPerson');
  if (el) el.textContent = found ? `${found.team.name} · ${found.person.name}` : '—';
}

// ══════════════════════════════════════
//  Load / render entry for selected person + date
// ══════════════════════════════════════
async function loadPersonDate() {
  updateBreadcrumb();
  const found = findPerson(selectedPersonId);
  if (!found) {
    document.getElementById('entryContent').innerHTML = `
      <div class="empty-state">
        <div class="big-emoji">📄</div>
        <p>왼쪽에서 팀과 구성원을 선택하세요.</p>
      </div>`;
    return;
  }

  const d = dateForOffset(currentDayOffset);
  const id = dateId(d);
  let data = null;
  const raw = await storeGet(entryKey(selectedPersonId, id));
  if (raw) { try { data = JSON.parse(raw); } catch(e) {} }

  renderEntryPage(found, d, data);
}

function renderEntryPage(found, dateObj, data) {
  const d = data || {};
  const manager = found.person.name;
  const teamLabel = found.team.name;

  document.getElementById('entryContent').innerHTML = `
    <div class="page-title-row">
      <span class="page-emoji">📋</span>
      <input class="page-title" id="f_title" value="업무 / 연구 일지" placeholder="제목">
    </div>

    <div class="page-meta">
      <div class="meta-item">
        <span class="meta-label">날짜</span>
        <span class="meta-text">${dateDisplay(dateObj)}</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">팀</span>
        <span class="meta-text" id="metaTeam">${esc(teamLabel)}</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">담당자</span>
        <span class="meta-text" id="metaManager">${esc(manager)}</span>
      </div>

// ══════════════════════════════════════
//  Save / clear / print
// ══════════════════════════════════════
async function saveCurrentState(silent) {
  if (!selectedPersonId) { if (!silent) showToast('선택된 구성원이 없습니다.', true); return; }
  const anchorEl = document.getElementById('f_yt');
  if (!anchorEl) return; // nothing rendered to save

  const found = findPerson(selectedPersonId);
  const g = id => document.getElementById(id)?.value || '';
  const data = {
    manager: found ? found.person.name : '',
    yt: g('f_yt'), yt_sub: g('f_yt_sub'),
    ig: g('f_ig'), ig_sub: g('f_ig_sub'),
    blog: g('f_blog'), blog_sub: g('f_blog_sub'),
    directive: g('f_directive'), directive_note: g('f_directive_note'),
    tasks: g('f_tasks'), tasks_note: g('f_tasks_note'),
    tomorrow: g('f_tomorrow'), tomorrow_note: g('f_tomorrow_note'),
    pending: g('f_pending'), pending_note: g('f_pending_note'),
  };

  const d = dateForOffset(currentDayOffset);
  const id = dateId(d);
  const ok = await storeSet(entryKey(selectedPersonId, id), JSON.stringify(data));
  if (!silent) {
    if (ok) showToast('저장되었습니다 ✓'); else showToast('저장 실패', true);
  }
}

function saveEntry() { saveCurrentState(false); }

async function clearCurrent() {
  if (!selectedPersonId) { showToast('선택된 구성원이 없습니다.', true); return; }
  if (!confirm('현재 화면(이 구성원 · 이 날짜)의 내용을 초기화할까요?')) return;
  const d = dateForOffset(currentDayOffset);
  const id = dateId(d);
  await storeDelete(entryKey(selectedPersonId, id));
  await loadPersonDate();
}

async function printPlan() {
  await saveCurrentState(true);
  const found = findPerson(selectedPersonId);
  const d = dateForOffset(currentDayOffset);
  const label = (found ? `${found.team.name}_${found.person.name}_${dateId(d)}` : '업무일지').replace(/\s+/g, '_');

  const isMobile = window.innerWidth <= 880 || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  if (isMobile && window.html2pdf) {
    showToast('PDF 생성 중...');
    const pageEl = document.querySelector('.page');

    // html2canvas는 현재 스크롤 위치를 기준으로 캡처 영역을 잡기 때문에,
    // 페이지가 스크롤된 상태에서 캡처하면 위쪽에 빈 여백이 생기고 아래쪽 내용이 잘립니다.
    // → 캡처 전 항상 맨 위로 스크롤하고, scrollX/scrollY를 0으로 고정합니다.
    const prevScrollX = window.scrollX, prevScrollY = window.scrollY;
    window.scrollTo(0, 0);
    await new Promise(resolve => setTimeout(resolve, 80));

    document.body.classList.add('pdf-export');
    pageEl.classList.add('pdf-export'); // html2canvas only clones pageEl's own subtree, not <body> — the class must live on pageEl itself to survive into the clone

    // html2canvas는 캡처 시점에 <input>의 실제 화면 표시값을 제대로 못 읽어오는
    // 알려진 버그가 있어, value/attribute를 바꾸는 방식은 근본적으로 불안정합니다.
    // → 캡처 직전에 input을 통째로 일반 텍스트(span)로 잠깐 바꿔치기해서 찍고,
    //   캡처가 끝나면 다시 원래 input으로 되돌립니다.
    const snsIds = ['f_yt', 'f_yt_sub', 'f_ig', 'f_ig_sub', 'f_blog', 'f_blog_sub'];
    const snsRestore = [];
    snsIds.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      const text = el.value.trim() === '' ? '0' : el.value;
      const cs = window.getComputedStyle(el);
      const span = document.createElement('span');
      span.textContent = text;
      span.style.cssText = [
        `display:inline-block`,
        `width:${cs.width}`,
        `height:${cs.height}`,
        `line-height:${cs.height}`,
        `font-size:${cs.fontSize}`,
        `font-family:${cs.fontFamily}`,
        `font-weight:${cs.fontWeight}`,
        `color:${cs.color}`,
        `text-align:${cs.textAlign}`,
        `margin:${cs.marginTop} ${cs.marginRight} ${cs.marginBottom} ${cs.marginLeft}`,
        `padding:0`,
        `vertical-align:middle`,
        `flex:0 0 auto`,
        `white-space:nowrap`,
      ].join(';');
      el.insertAdjacentElement('afterend', span);
      el.style.display = 'none';
      snsRestore.push({ el, span });
    });

    try {
      // A4 한 장에 내용이 잘리지 않고 딱 맞게 들어가도록, 캡처한 이미지를 직접 계산해서 배치합니다.
      // (html2pdf의 자동 페이지분할에 맡기면 세로가 긴 내용이 landscape 페이지 높이를 넘겨
      //  두 페이지로 나뉘거나, scale 옵션과 맞물려 오른쪽이 잘리는 문제가 있어 직접 한 장으로 만듭니다.)
      const worker = html2pdf().set({
        margin: 0,
        filename: `${label}.pdf`,
        image: { type: 'png' },
        html2canvas: {
          scale: 2,
          useCORS: true,
          scrollX: 0,
          scrollY: 0,
          windowWidth: 1000,
        },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
      }).from(pageEl);

      // .get()은 이미 만들어진 값을 읽기만 할 뿐 직접 만들어주지 않으므로,
      // toCanvas()/toPdf()를 명시적으로 먼저 실행해야 합니다.
      await worker.toCanvas();
      const canvas = await worker.get('canvas');
      // 캡처된 내용의 가로/세로 비율을 보고 더 잘 맞는 A4 방향을 자동으로 선택
      const orientation = canvas.width >= canvas.height ? 'landscape' : 'portrait';
      worker.set({ jsPDF: { unit: 'mm', format: 'a4', orientation } });

      await worker.toPdf();
      const pdf = await worker.get('pdf');
      // 기본 파이프라인이 만든 페이지(여러 장으로 잘렸을 수 있음)는 지우고 한 장만 남깁니다.
      for (let i = pdf.internal.getNumberOfPages(); i > 1; i--) pdf.deletePage(i);
      pdf.setPage(1);

      const pageWidth = pdf.internal.pageSize.getWidth();
      const pageHeight = pdf.internal.pageSize.getHeight();
      pdf.setFillColor(255, 255, 255);
      pdf.rect(0, 0, pageWidth, pageHeight, 'F'); // 기본 배치로 그려졌던 내용을 지움

      const margin = 8; // mm, 종이 여백
      const maxW = pageWidth - margin * 2;
      const maxH = pageHeight - margin * 2;
      const ratio = Math.min(maxW / canvas.width, maxH / canvas.height);
      const imgW = canvas.width * ratio;
      const imgH = canvas.height * ratio;
      const x = (pageWidth - imgW) / 2;
      const y = (pageHeight - imgH) / 2;
      pdf.addImage(canvas.toDataURL('image/png'), 'PNG', x, y, imgW, imgH);

      await worker.save();
    } catch (e) {
      console.error(e);
      showToast('PDF 생성 실패: ' + (e && e.message ? e.message : e), true);
    } finally {
      document.body.classList.remove('pdf-export');
      pageEl.classList.remove('pdf-export');
      snsRestore.forEach(({ el, span }) => {
        span.remove();
        el.style.display = '';
      });
      window.scrollTo(prevScrollX, prevScrollY);
    }
  } else {
    const prevTitle = document.title;
    document.title = label;
    window.print();
    setTimeout(() => { document.title = prevTitle; }, 500);
  }
}

// ══════════════════════════════════════
//  업무일지 내용 검색 (선택된 구성원의 모든 날짜를 대상)
// ══════════════════════════════════════
function escRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function openSearchModal() {
  if (!selectedPersonId) { showToast('먼저 구성원을 선택하세요.', true); return; }
  document.getElementById('searchModalOverlay').classList.add('show');
  document.getElementById('searchModal').classList.add('show');
  const input = document.getElementById('searchInput');
  input.value = '';
  document.getElementById('searchResults').innerHTML = '<div class="search-empty">검색어를 입력하세요.</div>';
  setTimeout(() => input.focus(), 50);
}
function closeSearchModal() {
  document.getElementById('searchModalOverlay').classList.remove('show');
  document.getElementById('searchModal').classList.remove('show');
}

const SEARCH_FIELDS = [
  ['directive', '교수님 지시사항'], ['directive_note', '교수님 지시사항·비고'],
  ['tasks', '금일 진행 업무'], ['tasks_note', '금일 진행 업무·비고'],
  ['tomorrow', '익일 업무'], ['tomorrow_note', '익일 업무·비고'],
  ['pending', '미진행 업무'], ['pending_note', '미진행 업무·비고'],
];

function dateIdToDateObj(id) {
  const y = 2000 + parseInt(id.slice(0,2), 10);
  const m = parseInt(id.slice(2,4), 10) - 1;
  const day = parseInt(id.slice(4,6), 10);
  return new Date(y, m, day);
}

async function runSearch() {
  const resultsEl = document.getElementById('searchResults');
  const q = document.getElementById('searchInput').value.trim();
  if (!q) { resultsEl.innerHTML = '<div class="search-empty">검색어를 입력하세요.</div>'; return; }
  if (!selectedPersonId) return;

  resultsEl.innerHTML = '<div class="search-empty">검색 중...</div>';
  const qLower = q.toLowerCase();
  const keys = await storeList(`dp_entry_${selectedPersonId}_`);

  const matches = [];
  for (const key of keys) {
    const raw = await storeGet(key);
    if (!raw) continue;
    let data; try { data = JSON.parse(raw); } catch(e) { continue; }

    for (const [field, fieldLabel] of SEARCH_FIELDS) {
      const val = data[field] || '';
      const idx = val.toLowerCase().indexOf(qLower);
      if (idx === -1) continue;
      const start = Math.max(0, idx - 18);
      const end = Math.min(val.length, idx + q.length + 18);
      const snippet = (start > 0 ? '…' : '') + val.slice(start, end) + (end < val.length ? '…' : '');
      const dId = key.slice(`dp_entry_${selectedPersonId}_`.length);
      matches.push({ dateId: dId, fieldLabel, snippet });
      break; // 항목당 한 번만, 같은 날짜에서 여러 필드가 일치해도 한 결과로
    }
  }

  matches.sort((a, b) => b.dateId.localeCompare(a.dateId));

  if (matches.length === 0) {
    resultsEl.innerHTML = '<div class="search-empty">검색 결과가 없습니다.</div>';
    return;
  }

  const re = new RegExp(escRegex(esc(q)), 'gi');
  resultsEl.innerHTML = matches.map(m => {
    const dObj = dateIdToDateObj(m.dateId);
    const dispDate = dateDisplay(dObj);
    const highlighted = esc(m.snippet).replace(re, s => `<mark>${s}</mark>`);
    return `<div class="search-result-item" onclick="goToSearchResult('${m.dateId}')">
      <div class="search-result-date">${dispDate} · ${esc(m.fieldLabel)}</div>
      <div class="search-result-snippet">${highlighted}</div>
    </div>`;
  }).join('');
}

async function goToSearchResult(dId) {
  const target = dateIdToDateObj(dId);
  target.setHours(0,0,0,0);
  const today = new Date(); today.setHours(0,0,0,0);
  await saveCurrentState(true);
  currentDayOffset = dayDiff(today, target);
  renderDateNav();
  await loadPersonDate();
  closeSearchModal();
  closeSidebarMobile();
}

// ── Mobile sidebar toggle ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}
function closeSidebarMobile() {
  if (window.innerWidth <= 880) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('show');
  }
}

function showToast(msg, isError = false) {
  const toast = document.createElement('div');
  toast.textContent = msg;
  Object.assign(toast.style, {
    position: 'fixed', bottom: '32px', right: '32px',
    background: isError ? '#eb5757' : '#37352f',
    color: '#fff', padding: '10px 18px', borderRadius: '6px',
    fontSize: '14px', zIndex: 9999,
    boxShadow: '0 4px 12px rgba(0,0,0,.15)',
    transition: 'opacity 0.3s',
  });
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity = 0; setTimeout(() => toast.remove(), 300); }, 2000);
}

// ══════════════════════════════════════
//  Init
// ══════════════════════════════════════
async function init() {
  TEAMS = await loadTeams();
  selectedPersonId = (await storeGet(SELECTED_KEY)) || (TEAMS[0]?.members[0]?.id ?? null);
  await seedDemoIfNeeded();

  renderSidebar();
  renderDateNav();

  const searchInput = document.getElementById('searchInput');
  if (searchInput) {
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) { e.preventDefault(); runSearch(); }
    });
  }
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeSearchModal();
  });

  if (selectedPersonId) {
    await loadPersonDate();
  } else {
    updateBreadcrumb();
  }
}

init();
