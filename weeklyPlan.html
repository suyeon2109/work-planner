<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주간계획</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
    background: #f7f6f3;
    color: #37352f;
    min-height: 100vh;
  }

  /* ─── Layout ─────────────────────────────────────────── */
  .app-layout {
    display: flex;
    align-items: flex-start;
    min-height: 100vh;
  }

  .main-wrap {
    flex: 1;
    min-width: 0;
    padding: 40px 20px 80px;
  }

  .page {
    max-width: 860px;
    margin: 0 auto;
    background: #fff;
    border-radius: 4px;
    padding: 60px 72px;
    box-shadow: rgba(15,15,15,.05) 0px 0px 0px 1px, rgba(15,15,15,.1) 0px 3px 6px;
  }

  /* ─── Sidebar ────────────────────────────────────────── */
  .sidebar {
    width: 250px;
    flex-shrink: 0;
    background: #fbfbfa;
    border-right: 1px solid #e3e2df;
    position: sticky;
    top: 0;
    align-self: flex-start;
    height: 100vh;
    overflow-y: auto;
    padding: 20px 10px 24px;
  }
  .sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 2px 8px 14px;
  }
  .sidebar-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #9b9a97;
  }
  .sidebar-add-team {
    border: none;
    background: none;
    cursor: pointer;
    color: #9b9a97;
    font-size: 12px;
    font-family: inherit;
    padding: 3px 7px;
    border-radius: 4px;
  }
  .sidebar-add-team:hover { background: #ecebe8; color: #37352f; }

  .team-group { margin-bottom: 2px; }

  .team-row {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 6px;
    border-radius: 4px;
    cursor: pointer;
  }
  .team-row:hover { background: #ecebe8; }
  .team-row:hover .team-action { opacity: 1; }
  .team-chevron {
    width: 13px;
    flex-shrink: 0;
    color: #9b9a97;
    font-size: 9px;
    display: flex;
    justify-content: center;
    transition: transform 0.15s;
  }
  .team-group.collapsed .team-chevron { transform: rotate(-90deg); }
  .team-dot { width: 6px; height: 6px; border-radius: 2px; background: #c1bdb7; flex-shrink: 0; }
  .team-name-input {
    flex: 1;
    min-width: 0;
    border: none;
    background: transparent;
    outline: none;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: #37352f;
  }
  .team-action {
    border: none;
    background: none;
    cursor: pointer;
    color: #c1bdb7;
    font-size: 12px;
    padding: 2px 5px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
  }
  .team-action:hover { color: #eb5757; }

  .member-list { list-style: none; overflow: hidden; }
  .team-group.collapsed .member-list,
  .team-group.collapsed .add-person-btn { display: none; }

  .person-row {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 6px 6px 25px;
    border-radius: 4px;
    cursor: pointer;
  }
  .person-row:hover { background: #ecebe8; }
  .person-row:hover .person-action { opacity: 1; }
  .person-row.active { background: #e7f3fb; }
  .person-row.active .person-name-input { color: #0b6e99; font-weight: 600; }
  .person-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #d3d0c8;
    flex-shrink: 0;
  }
  .person-row.active .person-dot { background: #2eaadc; }
  .person-name-input {
    flex: 0 1 auto;
    width: 110px;
    min-width: 0;
    border: none;
    background: transparent;
    outline: none;
    font-family: inherit;
    font-size: 13px;
    color: #37352f;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .person-spacer {
    flex: 1;
    align-self: stretch;
    min-width: 8px;
    cursor: pointer;
  }
  .person-action {
    border: none;
    background: none;
    cursor: pointer;
    color: #c1bdb7;
    font-size: 11px;
    padding: 2px 5px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
  }
  .person-action:hover { color: #eb5757; }

  /* 퇴사자 섹션 */
  .retired-section { margin-top: 10px; border-top: 1px solid #e3e2df; padding-top: 8px; }
  .retired-section-header {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 6px; cursor: pointer; border-radius: 4px;
  }
  .retired-section-header:hover { background: #ecebe8; }
  .retired-chevron {
    width: 13px; flex-shrink: 0; color: #9b9a97; font-size: 9px;
    display: flex; justify-content: center; transition: transform 0.15s;
  }
  .retired-section.collapsed .retired-chevron { transform: rotate(-90deg); }
  .retired-section-label { font-size: 11px; font-weight: 600; color: #b9b6ae; letter-spacing: 0.05em; }
  .retired-section.collapsed .retired-member-list { display: none; }
  .retired-member-list { list-style: none; }

  .person-row.retired .person-dot { background: #d3d0c8; }
  .person-row.retired .person-name-input { color: #9b9a97; text-decoration: line-through; }
  .person-row.retired.active .person-name-input { color: #6b9db3; }
  .person-row.retired.active { background: #f0f8fc; }

  /* 컨텍스트 메뉴 */
  .ctx-menu {
    position: fixed; z-index: 9999;
    background: #fff; border: 1px solid #e3e2df;
    border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,.12);
    padding: 4px; min-width: 140px; font-size: 13px;
  }
  .ctx-menu button {
    display: block; width: 100%; text-align: left;
    border: none; background: none; cursor: pointer;
    padding: 7px 12px; border-radius: 4px;
    color: #37352f; font-family: inherit; font-size: 13px;
  }
  .ctx-menu button:hover { background: #f0efee; }
  .ctx-menu button.danger { color: #eb5757; }
  .ctx-menu button.danger:hover { background: #fff0f0; }
  .ctx-menu button::before { content: ''; display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 8px; background: #c1bdb7; vertical-align: middle; flex-shrink: 0; }
  .ctx-menu button.danger::before { background: #eb5757; }
  .ctx-menu button.restore::before { background: #0f7b6c; }
  .ctx-menu .ctx-divider { border: none; border-top: 1px solid #e3e2df; margin: 3px 0; }

  .add-person-btn {
    display: block;
    width: 100%;
    text-align: left;
    padding: 5px 6px 8px 25px;
    border: none;
    background: none;
    cursor: pointer;
    color: #b9b6ae;
    font-size: 12px;
    font-family: inherit;
    transition: color 0.15s;
  }
  .add-person-btn:hover { color: #787774; }

  .sidebar-toggle, .sidebar-overlay { display: none; }

  /* Header */
  .page-title {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 10px;
    border: none;
    outline: none;
    width: auto;
    min-width: 80px;
    background: transparent;
    color: #37352f;
    line-height: 1.3;
  }
  .page-title::placeholder { color: #c1bdb7; }

  .page-meta {
    display: grid;
    grid-template-columns: 230px 230px 1fr;
    column-gap: 12px;
    margin-bottom: 28px;
  }
  .meta-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #787774;
    min-width: 0;
  }
  .meta-week-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 4px;
    font-weight: 600;
    background: #e7f3fb;
    color: #0b6e99;
  }
  .meta-label { font-weight: 500; color: #37352f; min-width: 60px; }
  .meta-input {
    border: none;
    outline: none;
    background: transparent;
    font-size: 14px;
    color: #37352f;
    font-family: inherit;
    border-bottom: 1px dashed #e3e2df;
    padding-bottom: 1px;
    min-width: 80px;
  }
  .meta-input:focus { border-bottom-color: #2eaadc; }
  .meta-text {
    font-size: 14px;
    color: #37352f;
    padding-bottom: 1px;
  }

  .divider {
    border: none;
    border-top: 1px solid #e3e2df;
    margin: 24px 0;
  }

  /* Section headers */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #9b9a97;
    margin-bottom: 12px;
  }

  /* Daily schedule table */
  .daily-table { width: 100%; border-collapse: collapse; margin-bottom: 28px; }
  .daily-table th {
    background: #f7f6f3;
    font-size: 12px;
    font-weight: 600;
    color: #9b9a97;
    text-align: center;
    padding: 8px 12px;
    border: 1px solid #e3e2df;
  }
  .daily-table td {
    border: 1px solid #e3e2df;
    vertical-align: middle;
    padding: 0;
  }
  .daily-table tbody tr {
    transition: background 0.1s;
  }
  .daily-table tbody tr:hover {
    background: #f7f6f3;
  }
  .day-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 12px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
  }
  .day-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .day-Mon .day-dot { background: #d9730d; }
  .day-Tue .day-dot { background: #0f7b6c; }
  .day-Wed .day-dot { background: #0b6e99; }
  .day-Thu .day-dot { background: #6940a5; }
  .day-Fri .day-dot { background: #c14b8a; }

  .day-col { width: 80px; }
  .tasks-cell {
    width: 100%;
  }
  .task-list {
    padding: 8px 12px;
    min-height: 48px;
    list-style: none;
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: 100%;
  }
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 3px 0;
    font-size: 14px;
    line-height: 1.5;
    color: #37352f;
    cursor: default;
  }
  .task-item::before {
    content: '•';
    color: #9b9a97;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .task-text {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: inherit;
    font-size: 14px;
    color: #37352f;
    line-height: 1.5;
    width: 100%;
    resize: none;
    overflow: hidden;
    min-height: 22px;
  }
  .task-text::placeholder { color: #c1bdb7; }
  .task-remove {
    background: none;
    border: none;
    cursor: pointer;
    color: #d3d0c8;
    font-size: 14px;
    line-height: 1;
    padding: 2px;
    opacity: 0;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .task-item:hover .task-remove { opacity: 1; }
  .task-remove:hover { color: #eb5757; }

  .add-task-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #c1bdb7;
    cursor: pointer;
    padding: 4px 12px 10px;
    border: none;
    background: none;
    font-family: inherit;
    transition: color 0.15s;
  }
  .add-task-btn:hover { color: #787774; }

  /* Instructions box */
  .instructions-box {
    background: #f7f6f3;
    border-radius: 4px;
    padding: 16px 20px;
    margin-bottom: 28px;
    border: 1px solid #e3e2df;
  }
  .instructions-box .section-label { margin-bottom: 10px; }
  .instructions-textarea {
    width: 100%;
    border: none;
    outline: none;
    background: transparent;
    font-family: inherit;
    font-size: 14px;
    color: #37352f;
    line-height: 1.7;
    resize: none;
    min-height: 90px;
    overflow: hidden;
  }
  .instructions-textarea::placeholder { color: #c1bdb7; }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 32px;
    justify-content: flex-end;
  }
  .btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 4px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s;
    border: none;
  }
  .btn-primary {
    background: #2eaadc;
    color: #fff;
  }
  .btn-primary:hover { background: #2499c5; }
  .btn-secondary {
    background: #f0efee;
    color: #37352f;
    border: 1px solid #e3e2df;
  }
  .btn-secondary:hover { background: #e3e2df; }

  /* Week navigator */
  .week-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }
  .week-label {
    font-size: 14px;
    color: #787774;
    font-weight: 500;
  }
  .nav-btn {
    background: none;
    border: 1px solid #e3e2df;
    border-radius: 4px;
    padding: 5px 10px;
    cursor: pointer;
    color: #787774;
    font-size: 13px;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: background 0.12s;
  }
  .nav-btn:hover { background: #f0efee; }
  .nav-group { display: flex; gap: 6px; }
  .week-picker {
    color: #37352f;
    font-size: 13px;
    padding: 5px 8px;
    background: none;
    cursor: pointer;
    font-family: inherit;
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 12px;
    font-weight: 600;
    background: #e8f5e9;
    color: #2e7d32;
    margin-left: 8px;
    vertical-align: middle;
  }

  /* PDF export (mobile "save as PDF") — hide chrome while capturing */
  .pdf-export .btn-row,
  .pdf-export .week-nav .nav-group,
  .pdf-export .sidebar,
  .pdf-export .sidebar-toggle,
  .pdf-export .add-task-btn,
  .pdf-export .task-remove,
  .pdf-export .team-action,
  .pdf-export .person-action,
  .pdf-export .add-person-btn,
  .pdf-export .sidebar-add-team {
    display: none !important;
  }

  /* PDF export — force the desktop layout regardless of actual screen width.
     (html2canvas's windowWidth option doesn't reliably re-evaluate the mobile
     @media rules in this pipeline, so the mobile-only rules must be overridden
     explicitly here instead.) */
  .page.pdf-export { padding: 60px 72px !important; border-radius: 4px !important; }
  .pdf-export .page-title { font-size: 32px !important; }
  .pdf-export .page-meta {
    display: grid !important;
    grid-template-columns: 230px 230px 1fr !important;
    column-gap: 12px !important;
  }
  .pdf-export .week-nav { flex-direction: row !important; align-items: center !important; }
  .pdf-export .daily-table th { padding: 8px 12px !important; }
  .pdf-export .daily-table td { padding: 0 !important; }
  .pdf-export .day-col { width: 80px !important; min-width: 80px !important; }
  .pdf-export .day-tag { padding: 10px 12px !important; font-size: 13px !important; gap: 6px !important; }
  .pdf-export .daily-table colgroup col:nth-child(2) { width: 60px !important; }
  .pdf-export .daily-table td:nth-child(2) {
    padding: 10px 8px !important;
    font-size: 13px !important;
  }
  .pdf-export .task-list { padding: 8px 12px !important; }
  .pdf-export .task-text { font-size: 14px !important; }

  @media (max-width: 880px) {
    .app-layout { display: block; }
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      width: 270px;
      max-width: 82vw;
      z-index: 50;
      transform: translateX(-100%);
      transition: transform 0.2s ease;
      box-shadow: 2px 0 16px rgba(0,0,0,.15);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,15,15,.35);
      z-index: 40;
    }
    .sidebar-overlay.show { display: block; }
    .sidebar-toggle {
      display: flex;
      position: fixed;
      top: 14px; left: 14px;
      z-index: 45;
      align-items: center;
      gap: 6px;
      background: #fff;
      border: 1px solid #e3e2df;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      color: #37352f;
      box-shadow: 0 1px 6px rgba(0,0,0,.1);
    }
    .main-wrap { padding-top: 68px; }
  }

  @media (max-width: 600px) {
    .main-wrap { padding: 60px 8px 60px; }
    .page { padding: 20px 14px; border-radius: 4px; }
    .page-title { font-size: 22px; }

    /* meta: 세로로 */
    .page-meta {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 18px;
    }

    /* week nav: 위 라벨 / 아래 버튼 */
    .week-nav {
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 20px;
    }
    .nav-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      width: 100%;
    }
    .nav-group select.nav-btn.week-picker {
      grid-column: 1 / -1;
      width: 100%;
    }

    /* 테이블: 날짜 열 좁게 */
    .daily-table th,
    .daily-table td { padding: 0; }
    .day-col { width: 56px; min-width: 56px; }
    .day-tag { padding: 8px 6px; font-size: 12px; gap: 4px; }
    .daily-table colgroup col:nth-child(2) { width: 32px; }
    .daily-table td:nth-child(2) {
      padding: 8px 4px;
      font-size: 12px;
    }
    .task-list { padding: 6px 8px; }
    .task-text { font-size: 13px; }
    .add-task-btn { padding: 3px 8px 8px; font-size: 12px; }

    /* 버튼 행: 2열 그리드 */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 20px;
      justify-content: initial;
    }
    .btn { font-size: 13px; padding: 8px 10px; justify-content: center; }
  }


  /* ── Professor Mode ── */
  .prof-mode-btn { background:#fff0f0;color:#c0392b;border:1.5px solid #eb5757;border-radius:4px;padding:7px 14px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:6px;transition:background 0.15s; }
  .prof-mode-btn.active { background:#c0392b;color:#fff;border-color:#a93226; }
  .prof-mode-banner { display:none;background:#fff0f0;border:1.5px solid #eb5757;border-radius:6px;padding:9px 14px;color:#c0392b;font-size:13px;font-weight:600;margin-bottom:16px;align-items:center;gap:8px; }
  .prof-mode-banner.show { display:flex; }
  .comment-list { display:flex;flex-direction:column;gap:4px;margin:4px 12px 6px; }
  .comment-item { display:flex;align-items:flex-start;gap:6px;padding:6px 10px;border-left:3px solid #eb5757;background:#fff8f8;border-radius:0 4px 4px 0; }
  .comment-item-text { flex:1;color:#c0392b;font-size:13px;line-height:1.6;white-space:pre-wrap;font-weight:500; }
  .comment-del-btn { opacity:0;border:none;background:none;cursor:pointer;color:#c0392b;font-size:14px;padding:0 3px;flex-shrink:0;transition:opacity 0.15s;line-height:1;align-self:flex-start; }
  .comment-item:hover .comment-del-btn { opacity:1; }
  .comment-edit-wrap { display:none;padding:4px 12px 8px; }
  .prof-mode-active .comment-edit-wrap { display:block; }
  .comment-textarea { width:100%;border:1px solid #eb5757;border-radius:4px;padding:6px 8px;font-size:13px;color:#c0392b;font-family:inherit;background:#fff8f8;resize:none;min-height:44px;outline:none;line-height:1.6; }
  .comment-textarea::placeholder { color:#f0a0a0; }
  .comment-btn-row { display:flex;gap:6px;margin-top:4px;justify-content:flex-end; }
  .comment-save-btn { border:none;border-radius:4px;padding:3px 12px;font-size:12px;cursor:pointer;font-family:inherit;background:#eb5757;color:#fff;font-weight:600; }
  .comment-clear-btn { border:none;border-radius:4px;padding:3px 10px;font-size:12px;cursor:pointer;font-family:inherit;background:#f0efee;color:#787774; }
  /* .instructions-comment-display legacy removed */
  .instructions-comment-wrap { display:none;margin-top:8px; }
  .prof-mode-active .instructions-comment-wrap { display:block; }
  .signature-section { margin-top:20px;border:1px solid #e3e2df;border-radius:8px;padding:14px 20px;display:none;align-items:center;gap:16px;flex-wrap:wrap; }
  .prof-mode-active .signature-section { display:flex; }
  .sig-btn,.sig-clear-btn { display:none; }
  .prof-mode-active .sig-btn,.prof-mode-active .sig-clear-btn { display:inline-block; }
  .signature-label { font-size:13px;font-weight:600;color:#37352f;white-space:nowrap; }
  .signature-display { flex:1;display:flex;align-items:center;min-height:54px; }

<script>
// ─── Constants ──────────────────────────────────────────────────────────────
const DAYS = [
  { code: 'Mon', label: '월', cls: 'day-Mon' },
  { code: 'Tue', label: '화', cls: 'day-Tue' },
  { code: 'Wed', label: '수', cls: 'day-Wed' },
  { code: 'Thu', label: '목', cls: 'day-Thu' },
  { code: 'Fri', label: '금', cls: 'day-Fri' },
];

// Demo content shown only the very first time (first member, current week, no saved data yet)
const DEMO_PERSON_ID = 'p1';
const DEFAULT_TASKS = {
  Mon: ['YT-S4-001 롱폼 편집', "'셀프 인테리어 My Home' 네이버 카페 활동", '유튜브 숏폼, 인스타 릴스 업로드 (오후 5시)'],
  Tue: ["'셀프 인테리어 My Home' 네이버 카페 활동", '미디어채널 분석자료', '전원속의 내집 인스타그램 카드뉴스 발행'],
  Wed: ['유튜브 숏폼, 인스타 릴스 업로드 (오후 5시)'],
  Thu: ['CN. 003 한국 수자원공사 수련원 카드뉴스 업로드'],
  Fri: ['유튜브 숏폼, 인스타 릴스 업로드 (오후 5시)'],
};

const DEFAULT_TEAMS = [
  { id: 't1', name: 'BMD팀', members: [
      { id: 'p1', name: '임수연PD' }
  ]},
  { id: 't2', name: '기술팀', members: [
   
  ]}
];

const TEAMS_KEY = 'wp_teams_v1';
const SELECTED_KEY = 'wp_selected_v1';

// ─── State ────────────────────────────────────────────────────────────────────
let TEAMS = [];
let selectedPersonId = null;
let currentWeekOffset = 0;
const collapsedTeams = new Set();

// ─── Firebase ────────────────────────────────────────────────────────────────
const _firebaseConfig = {
  apiKey: "AIzaSyC4sYx0-60NVCK2MI9z8cKpKUry4R_bLgM",
  authDomain: "work-planner-62897.firebaseapp.com",
  projectId: "work-planner-62897",
  storageBucket: "work-planner-62897.firebasestorage.app",
  messagingSenderId: "199105250426",
  appId: "1:199105250426:web:6cf9f54c659cf5950a67c3"
};
let _db = null;
function getDb() {
  if (_db) return _db;
  if (!firebase.apps.length) firebase.initializeApp(_firebaseConfig);
  _db = firebase.firestore();
  return _db;
}
const FS_COL = 'wp_store';

async function safeGet(key) {
  try { const snap = await getDb().collection(FS_COL).doc(key).get(); return snap.exists ? snap.data().v : null; }
  catch(e) { return null; }
}
async function safeSet(key, val) {
  try { await getDb().collection(FS_COL).doc(key).set({ v: val }); }
  catch(e) { console.error(e); }
}
async function safeRemove(key) {
  try { await getDb().collection(FS_COL).doc(key).delete(); } catch(e) {}
}

async function loadTeams() {
  const raw = await safeGet(TEAMS_KEY);
  if (raw) { try { return JSON.parse(raw); } catch(e) {} }
  return JSON.parse(JSON.stringify(DEFAULT_TEAMS));
}
function persistTeams() { safeSet(TEAMS_KEY, JSON.stringify(TEAMS)); }
function uid(prefix) { return prefix + '_' + Math.random().toString(36).slice(2, 9); }
function escapeAttr(str) { return String(str ?? '').replace(/&/g, '&amp;').replace(/"/g, '&quot;'); }
function dataKey(personId, offset) { return `wp_data_${personId}_${offset}`; }

function findPerson(personId) {
  for (const team of TEAMS) {
    const m = team.members.find(m => m.id === personId);
    if (m) return { team, person: m };
  }
  return null;
}

// ─── Week helpers ─────────────────────────────────────────────────────────────
function getWeekStart(offset = 0) {
  const today = new Date();
  const day = today.getDay();
  const diff = today.getDate() - day + (day === 0 ? -6 : 1);
  const mon = new Date(today.setDate(diff));
  mon.setDate(mon.getDate() + offset * 7);
  return mon;
}

function formatDate(d) {
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${mm}${dd}`;
}

function getWeekLabel(offset) {
  const mon = getWeekStart(offset);
  const year = mon.getFullYear();
  const month = mon.getMonth() + 1;
  const weekOfMonth = Math.ceil(mon.getDate() / 7);
  return `${year}년 ${String(month).padStart(2, '0')}월 ${weekOfMonth}주차`;
}

// weekPicker(select)에 표시할 주차 범위: 과거 26주 ~ 미래 26주
const WEEK_PICKER_RANGE = 26;

function populateWeekPicker() {
  const picker = document.getElementById('weekNavPicker');
  if (!picker) return;
  let html = '';
  for (let off = -WEEK_PICKER_RANGE; off <= WEEK_PICKER_RANGE; off++) {
    html += `<option value="${off}">${getWeekLabel(off)}</option>`;
  }
  picker.innerHTML = html;
}

async function changeWeek(dir) {
  await saveCurrentState(true);
  currentWeekOffset += dir;
  renderWeek();
  await loadPersonWeek(selectedPersonId, currentWeekOffset);
}

// weekPicker(select)에서 "2026년 06월 3주차" 같은 주차를 고르면 해당 주로 이동
async function jumpToWeekOffset(value) {
  const offset = parseInt(value, 10);
  if (Number.isNaN(offset) || offset === currentWeekOffset) return;
  await saveCurrentState(true);
  currentWeekOffset = offset;
  renderWeek();
  await loadPersonWeek(selectedPersonId, currentWeekOffset);
}

// 매주 금요일 다음 주 계획을 작성하는 워크플로용: 실제 기준 '다음 주'로 바로 이동
async function goToNextWeek() {
  if (currentWeekOffset === 1) return;
  await saveCurrentState(true);
  currentWeekOffset = 1;
  renderWeek();
  await loadPersonWeek(selectedPersonId, currentWeekOffset);
}

function renderWeek() {
  document.getElementById('weekLabel').textContent = getWeekLabel(currentWeekOffset);
  const metaWeekEl = document.getElementById('metaWeek');
  if (metaWeekEl) metaWeekEl.textContent = getWeekLabel(currentWeekOffset);
  const mon = getWeekStart(currentWeekOffset);
  const picker = document.getElementById('weekNavPicker');
  if (picker) picker.value = String(currentWeekOffset);
  const tbody = document.getElementById('dailyBody');
  tbody.querySelectorAll('tr').forEach((tr, i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    tr.querySelector('.date-cell').textContent = formatDate(d);
  });
}

// ─── Daily table skeleton ──────────────────────────────────────────────────────
function renderDailyTable() {
  const tbody = document.getElementById('dailyBody');
  tbody.innerHTML = '';
  const mon = getWeekStart(currentWeekOffset);

  DAYS.forEach((day, i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <div class="day-tag ${day.cls}">
          <span class="date-cell">${formatDate(d)}</span>
        </div>
      </td>
      <td style="text-align:center;padding:10px 8px;font-size:13px;font-weight:600;color:#37352f;">${day.label}</td>
      <td class="tasks-cell">
        <ul class="task-list" id="tasks-${day.code}"></ul>
        <button class="add-task-btn" onclick="addTask('${day.code}')">+ 업무 추가</button>
        <div class="comment-list" id="wp-clist-${day.code}"></div>
        <div class="comment-edit-wrap">
          <textarea class="comment-textarea" id="wp-cta-${day.code}" placeholder="교수님 코멘트 입력..." rows="2"></textarea>
          <div class="comment-btn-row">
            <button class="comment-save-btn" onclick="wpSaveComment('${day.code}')">+ 추가</button>
          </div>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function addTask(dayCode, value = '') {
  addTaskItem(dayCode, value);
  const list = document.getElementById(`tasks-${dayCode}`);
  const last = list.lastElementChild;
  if (last) last.querySelector('.task-text').focus();
}

function addTaskItem(dayCode, value = '') {
  const list = document.getElementById(`tasks-${dayCode}`);
  const li = document.createElement('li');
  li.className = 'task-item';

  const ta = document.createElement('textarea');
  ta.className = 'task-text';
  ta.value = value;
  ta.placeholder = '업무 내용 입력…';
  ta.rows = 1;
  ta.oninput = () => autoResize(ta);

  // 한글 입력기(IME)에서는 Enter 한 번에
  // ① 마지막 글자 확정 이벤트와 ② 일반 Enter 이벤트가 연달아 올 수 있습니다.
  // 같은 Enter를 한 번만 처리하도록 잠금값을 둡니다.
  let isComposing = false;
  let pendingEnter = false;
  let ignoreEnterUntil = 0;

  function addTaskOnce() {
    // 동일한 Enter 이벤트가 중복으로 전달되는 경우를 한 번만 처리
    if (Date.now() < ignoreEnterUntil) return;
    ignoreEnterUntil = Date.now() + 180;
    addTask(dayCode);
  }

  ta.addEventListener('compositionstart', () => {
    isComposing = true;
  });

  ta.addEventListener('compositionend', () => {
    isComposing = false;

    // 한글 조합 중 Enter를 눌렀다면, 글자가 확정된 뒤 업무칸을 정확히 한 번만 추가
    if (pendingEnter) {
      pendingEnter = false;
      requestAnimationFrame(() => addTaskOnce());
    }
  });

  // textarea 안에 실제 줄바꿈이 생기는 것은 항상 차단
  ta.addEventListener('beforeinput', (e) => {
    if (e.inputType === 'insertLineBreak' || e.inputType === 'insertParagraph') {
      e.preventDefault();
    }
  });

  ta.onkeydown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      // 한글 조합 중인 Enter는 글자 확정을 우선 허용하고,
      // compositionend에서 새 업무칸을 한 번만 만듭니다.
      if (isComposing || e.isComposing || e.keyCode === 229) {
        pendingEnter = true;
        return;
      }

      // 직전에 한글 확정용 Enter가 처리되었다면 이어지는 중복 Enter는 무시
      if (pendingEnter || Date.now() < ignoreEnterUntil) {
        e.preventDefault();
        return;
      }

      e.preventDefault();
      addTaskOnce();
      return;
    }

    if (e.key === 'Backspace' && ta.value === '') {
      e.preventDefault();
      li.remove();
    }
  };
  setTimeout(() => autoResize(ta), 0);

  const btn = document.createElement('button');
  btn.className = 'task-remove';
  btn.innerHTML = '✕';
  btn.onclick = () => li.remove();

  li.appendChild(ta);
  li.appendChild(btn);
  list.appendChild(li);
}

// ─── Sidebar (teams / members, 2-depth) ─────────────────────────────────────────
function renderSidebar() {
  const tree = document.getElementById('sidebarTree');
  tree.innerHTML = '';

  // 모든 퇴사자 수집 (팀 무관)
  const allRetired = TEAMS.flatMap(t => t.members.filter(m => m.retired).map(m => ({ team: t, person: m })));

  TEAMS.forEach(team => {
    const activeMembers = team.members.filter(m => !m.retired);

    const group = document.createElement('div');
    group.className = 'team-group' + (collapsedTeams.has(team.id) ? ' collapsed' : '');

    const row = document.createElement('div');
    row.className = 'team-row';
    row.dataset.teamId = team.id;
    row.innerHTML = `
      <span class="team-chevron">▾</span>
      <span class="team-dot"></span>
      <input class="team-name-input" value="${escapeAttr(team.name)}" />
      <button class="team-action" title="팀 삭제">✕</button>
    `;
    const nameInput = row.querySelector('.team-name-input');
    const removeBtn = row.querySelector('.team-action');

    row.addEventListener('click', () => toggleTeam(team.id));
    nameInput.addEventListener('click', (e) => e.stopPropagation());
    nameInput.addEventListener('input', () => {
      team.name = nameInput.value;
      persistTeams();
      if (team.members.some(m => m.id === selectedPersonId)) updateMemberLabel();
    });
    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) { e.preventDefault(); nameInput.blur(); }
    });
    removeBtn.addEventListener('click', (e) => { e.stopPropagation(); removeTeam(team.id); });

    group.appendChild(row);

    const list = document.createElement('ul');
    list.className = 'member-list';
    activeMembers.forEach(person => {
      list.appendChild(buildPersonLi(team, person));
    });
    group.appendChild(list);

    const addPersonBtn = document.createElement('button');
    addPersonBtn.className = 'add-person-btn';
    addPersonBtn.textContent = '+ 구성원 추가';
    addPersonBtn.addEventListener('click', (e) => { e.stopPropagation(); addMember(team.id); });
    group.appendChild(addPersonBtn);

    tree.appendChild(group);
  });

  // 퇴사자 섹션
  if (allRetired.length > 0) {
    const retiredSection = document.createElement('div');
    retiredSection.className = 'retired-section' + (collapsedTeams.has('__retired__') ? ' collapsed' : '');

    const header = document.createElement('div');
    header.className = 'retired-section-header';
    header.innerHTML = `<span class="retired-chevron">▾</span><span class="retired-section-label">퇴사자 (${allRetired.length})</span>`;
    header.addEventListener('click', () => {
      if (collapsedTeams.has('__retired__')) collapsedTeams.delete('__retired__');
      else collapsedTeams.add('__retired__');
      renderSidebar();
    });
    retiredSection.appendChild(header);

    const rList = document.createElement('ul');
    rList.className = 'retired-member-list';
    allRetired.forEach(({ team, person }) => {
      rList.appendChild(buildPersonLi(team, person));
    });
    retiredSection.appendChild(rList);
    tree.appendChild(retiredSection);
  }
}

function buildPersonLi(team, person) {
  const li = document.createElement('li');
  const pRow = document.createElement('div');
  const isRetired = !!person.retired;
  pRow.className = 'person-row' + (person.id === selectedPersonId ? ' active' : '') + (isRetired ? ' retired' : '');
  pRow.dataset.personId = person.id;
  pRow.innerHTML = `
    <span class="person-dot"></span>
    <input class="person-name-input" value="${escapeAttr(person.name)}" ${isRetired ? 'readonly' : ''} />
    <span class="person-spacer" title="선택하고 계획 보기"></span>
    <button class="person-action" title="옵션">···</button>
  `;
  const pInput = pRow.querySelector('.person-name-input');
  const pSpacer = pRow.querySelector('.person-spacer');
  const pActionBtn = pRow.querySelector('.person-action');

  pRow.addEventListener('click', () => selectPerson(person.id));
  pInput.addEventListener('click', (e) => { e.stopPropagation(); if (!isRetired) selectPerson(person.id, false, true); });
  pSpacer.addEventListener('click', (e) => { e.stopPropagation(); selectPerson(person.id); });
  if (!isRetired) {
    pInput.addEventListener('input', () => {
      person.name = pInput.value;
      persistTeams();
      if (person.id === selectedPersonId) updateMemberLabel();
    });
    pInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) { e.preventDefault(); pInput.blur(); closeSidebarMobile(); }
    });
  }
  pActionBtn.addEventListener('click', (e) => { e.stopPropagation(); showPersonMenu(e, team.id, person); });

  li.appendChild(pRow);
  return li;
}

function toggleTeam(teamId) {
  if (collapsedTeams.has(teamId)) collapsedTeams.delete(teamId);
  else collapsedTeams.add(teamId);
  renderSidebar();
}

function addTeam() {
  const team = { id: uid('t'), name: '새 팀', members: [] };
  TEAMS.push(team);
  persistTeams();
  renderSidebar();
  requestAnimationFrame(() => {
    const el = document.querySelector(`.team-row[data-team-id="${team.id}"] .team-name-input`);
    if (el) { el.focus(); el.select(); }
  });
}

function removeTeam(teamId) {
  const team = TEAMS.find(t => t.id === teamId);
  if (!team) return;
  if (!confirm(`'${team.name}' 팀을 삭제할까요? 구성원과 저장된 계획도 함께 제거됩니다.`)) return;

  team.members.forEach(m => safeRemove(dataKey(m.id, currentWeekOffset)));
  TEAMS = TEAMS.filter(t => t.id !== teamId);
  persistTeams();

  if (team.members.some(m => m.id === selectedPersonId)) {
    selectedPersonId = TEAMS[0]?.members[0]?.id ?? null;
    safeSet(SELECTED_KEY, selectedPersonId || '');
    loadPersonWeek(selectedPersonId, currentWeekOffset);
  }
  renderSidebar();
}

async function addMember(teamId) {
  const team = TEAMS.find(t => t.id === teamId);
  if (!team) return;
  const person = { id: uid('p'), name: '새 구성원' };
  team.members.push(person);
  persistTeams();
  // skipMobileClose=true: 새 구성원 이름을 입력하는 동안 모바일 사이드바가 닫히지 않도록 유지
  await selectPerson(person.id, true, true);
  requestAnimationFrame(() => {
    const el = document.querySelector(`.person-row[data-person-id="${person.id}"] .person-name-input`);
    if (el) { el.focus(); el.select(); }
  });
}

function retireMember(teamId, personId) {
  const team = TEAMS.find(t => t.id === teamId);
  if (!team) return;
  const person = team.members.find(m => m.id === personId);
  if (!person) return;
  person.retired = true;
  persistTeams();

  if (selectedPersonId === personId) {
    const active = TEAMS.flatMap(t => t.members).find(m => !m.retired);
    selectedPersonId = active?.id ?? null;
    safeSet(SELECTED_KEY, selectedPersonId || '');
    loadPersonWeek(selectedPersonId, currentWeekOffset);
  }
  renderSidebar();
}

function restoreMember(teamId, personId) {
  const team = TEAMS.find(t => t.id === teamId);
  if (!team) return;
  const person = team.members.find(m => m.id === personId);
  if (!person) return;
  delete person.retired;
  persistTeams();
  renderSidebar();
}

async function removeMember(teamId, personId) {
  const team = TEAMS.find(t => t.id === teamId);
  if (!team) return;
  if (!confirm('완전 삭제하면 저장된 계획도 모두 사라집니다. 계속할까요?')) return;

  team.members = team.members.filter(m => m.id !== personId);
  persistTeams();
  await safeRemove(dataKey(personId, currentWeekOffset));

  if (selectedPersonId === personId) {
    selectedPersonId = TEAMS.flatMap(t => t.members).find(m => !m.retired)?.id ?? null;
    await safeSet(SELECTED_KEY, selectedPersonId || '');
    await loadPersonWeek(selectedPersonId, currentWeekOffset);
  }
  renderSidebar();
}

function showPersonMenu(e, teamId, person) {
  document.querySelectorAll('.ctx-menu').forEach(m => m.remove());

  const menu = document.createElement('div');
  menu.className = 'ctx-menu';

  if (!person.retired) {
    const retireBtn = document.createElement('button');
    retireBtn.className = 'retire'; retireBtn.textContent = '퇴사 처리';
    retireBtn.addEventListener('click', () => { menu.remove(); retireMember(teamId, person.id); });
    menu.appendChild(retireBtn);

    const divider = document.createElement('div');
    divider.className = 'ctx-divider';
    menu.appendChild(divider);
  } else {
    const reinstateBtn = document.createElement('button');
    reinstateBtn.className = 'restore'; reinstateBtn.textContent = '복직 처리';
    reinstateBtn.addEventListener('click', () => { menu.remove(); reinstateMember(teamId, person.id); });
    menu.appendChild(reinstateBtn);

    const divider = document.createElement('div');
    divider.className = 'ctx-divider';
    menu.appendChild(divider);
  }

  const deleteBtn = document.createElement('button');
  deleteBtn.textContent = '완전 삭제';
  deleteBtn.className = 'danger';
  deleteBtn.addEventListener('click', () => { menu.remove(); removeMember(teamId, person.id); });
  menu.appendChild(deleteBtn);

  // 위치 계산
  const rect = e.target.getBoundingClientRect();
  menu.style.top = `${rect.bottom + 4}px`;
  menu.style.left = `${Math.min(rect.left, window.innerWidth - 160)}px`;
  document.body.appendChild(menu);

  const close = (ev) => { if (!menu.contains(ev.target)) { menu.remove(); document.removeEventListener('click', close, true); } };
  setTimeout(() => document.addEventListener('click', close, true), 0);
}

function retireMember(teamId, personId) {
  const team = TEAMS.find(t => t.id === teamId);
  if (!team) return;
  const person = team.members.find(m => m.id === personId);
  if (!person) return;
  person.retired = true;
  persistTeams();

  if (selectedPersonId === personId) {
    const active = TEAMS.flatMap(t => t.members).find(m => !m.retired);
    selectedPersonId = active?.id ?? null;
    safeSet(SELECTED_KEY, selectedPersonId || '');
    loadPersonWeek(selectedPersonId, currentWeekOffset);
  }
  renderSidebar();
}

function reinstateMember(teamId, personId) {
  const team = TEAMS.find(t => t.id === teamId);
  if (!team) return;
  const person = team.members.find(m => m.id === personId);
  if (!person) return;
  delete person.retired;
  persistTeams();
  renderSidebar();
}

async function selectPerson(personId, skipSave, skipMobileClose) {
  if (personId === selectedPersonId) { if (!skipMobileClose) closeSidebarMobile(); return; }
  if (!skipSave) await saveCurrentState(true);
  selectedPersonId = personId;
  await safeSet(SELECTED_KEY, personId || '');
  renderSidebar();
  await loadPersonWeek(selectedPersonId, currentWeekOffset);
  if (!skipMobileClose) closeSidebarMobile();
}

function updateMemberLabel() {
  const found = findPerson(selectedPersonId);
  const teamEl = document.getElementById('metaTeam');
  const managerEl = document.getElementById('metaManager');
  if (found) {
    teamEl.textContent = found.team.name;
    managerEl.textContent = found.person.name;
  }
}

// ─── Load / save plan data per person + week ────────────────────────────────────
async function loadPersonWeek(personId, offset) {
  const teamEl = document.getElementById('metaTeam');
  const managerEl = document.getElementById('metaManager');
  const instructionsText = document.getElementById('instructionsText');
  const found = findPerson(personId);

  DAYS.forEach(d => { document.getElementById(`tasks-${d.code}`).innerHTML = ''; });

  if (!found) {
    teamEl.textContent = '—';
    managerEl.textContent = '—';
    instructionsText.value = '';
    return;
  }

  let data = null;
  const raw = await safeGet(dataKey(personId, offset));
  if (raw) { try { data = JSON.parse(raw); } catch(e) {} }

  teamEl.textContent = found.team.name;
  managerEl.textContent = found.person.name;

  if (data && data.tasks) {
    DAYS.forEach(d => (data.tasks[d.code] || []).forEach(t => addTaskItem(d.code, t)));
  } else if (personId === DEMO_PERSON_ID && offset === 0) {
    DAYS.forEach(d => (DEFAULT_TASKS[d.code] || []).forEach(t => addTaskItem(d.code, t)));
  }

  instructionsText.value = (data && data.instructions) || '';
  autoResize(instructionsText);

  const pc = (data && data.profComments) || {};
  const commentKeys = ['instructions', ...DAYS.map(d => d.code)];
  commentKeys.forEach(key => {
    const disp = document.getElementById('wp-cdisplay-' + key);
    const ta = document.getElementById('wp-cta-' + key);
    const text = pc[key] || '';
    if (disp) { disp.textContent = text; disp.style.display = text ? '' : 'none'; }
    if (ta) { ta.value = text; autoResize(ta); }
  });
  wpCurrentSignature = (data && data.signature) || null;
  wpRenderSigDisplay();
  wpApplyProfMode();
  autoSizeInput(document.getElementById('pageTitle'));
}

// 지난주(현재 보고 있는 주의 바로 전 주) 업무 내용을 그대로 가져와 현재 주에 채워넣기
async function importLastWeek() {
  if (!selectedPersonId) { showToast('선택된 구성원이 없습니다.', true); return; }

  const raw = await safeGet(dataKey(selectedPersonId, currentWeekOffset - 1));
  if (!raw) { showToast('지난주에 저장된 내용이 없습니다.', true); return; }

  let data = null;
  try { data = JSON.parse(raw); } catch(e) {}
  if (!data) { showToast('지난주 내용을 불러올 수 없습니다.', true); return; }

  const hasCurrentContent = DAYS.some(d => document.querySelectorAll(`#tasks-${d.code} .task-text`).length > 0)
    || document.getElementById('instructionsText').value.trim() !== '';
  if (hasCurrentContent && !confirm('현재 주의 내용을 지난주 내용으로 덮어쓸까요?')) return;

  DAYS.forEach(d => { document.getElementById(`tasks-${d.code}`).innerHTML = ''; });
  if (data.tasks) {
    DAYS.forEach(d => (data.tasks[d.code] || []).forEach(t => addTaskItem(d.code, t)));
  }

  const instructionsText = document.getElementById('instructionsText');
  instructionsText.value = data.instructions || '';
  autoResize(instructionsText);

  showToast('지난주 내용을 가져왔습니다 ✓');
}

async function saveCurrentState(silent) {
  if (!selectedPersonId) { if (!silent) showToast('선택된 구성원이 없습니다.', true); return; }

  const found = findPerson(selectedPersonId);
  const data = {
    member: found ? `${found.team.name} ${found.person.name}` : '',
    tasks: {},
    instructions: document.getElementById('instructionsText').value,
    profComments: wpGetCurrentComments(),
    signature: wpCurrentSignature,
  };
  DAYS.forEach(d => {
    data.tasks[d.code] = [...document.querySelectorAll(`#tasks-${d.code} .task-text`)].map(t => t.value).filter(Boolean);
  });

  try {
    await safeSet(dataKey(selectedPersonId, currentWeekOffset), JSON.stringify(data));
    if (!silent) showToast('저장되었습니다 ✓');
  } catch(e) {
    if (!silent) showToast('저장 실패: ' + e.message, true);
  }
}

function saveData() { saveCurrentState(false); }

function autoResize(el) {

  el.style.height = el.scrollHeight + 'px';
}

async function clearAll() {
  if (!confirm('현재 화면(이 구성원·이 주)의 내용을 초기화할까요?')) return;
  DAYS.forEach(d => { document.getElementById(`tasks-${d.code}`).innerHTML = ''; });
  document.getElementById('instructionsText').value = '';
  autoResize(document.getElementById('instructionsText'));

async function printPlan() {
  await saveCurrentState(true);
  const week = getWeekLabel(currentWeekOffset);
  const found = findPerson(selectedPersonId);
  const member = (found ? `${found.team.name}_${found.person.name}` : '주간계획');
  const label = `${member}_${week}`.replace(/\s+/g, '_');

  const isMobile = window.innerWidth <= 880 || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  if (isMobile && window.html2pdf) {
    showToast('PDF 생성 중...');
    const pageEl = document.querySelector('.page');

    // html2canvas는 현재 스크롤 위치를 기준으로 캡처 영역을 잡기 때문에,
    // 페이지가 스크롤된 상태에서 캡처하면 위쪽에 빈 여백이 생기고 아래쪽 내용이 잘립니다.
    // → 캡처 전 항상 맨 위로 스크롤하고, scrollX/scrollY를 0으로 고정합니다.
    const prevScrollX = window.scrollX, prevScrollY = window.scrollY;
    window.scrollTo(0, 0);
    await new Promise(resolve => setTimeout(resolve, 80));

    document.body.classList.add('pdf-export');
    pageEl.classList.add('pdf-export'); // html2canvas only clones pageEl's own subtree, not <body> — the class must live on pageEl itself to survive into the clone
    try {
      // A4 한 장에 내용이 잘리지 않고 딱 맞게 들어가도록, 캡처한 이미지를 직접 계산해서 배치합니다.
      // (html2pdf의 자동 페이지분할에 맡기면 세로가 긴 내용이 landscape 페이지 높이를 넘겨
      //  두 페이지로 나뉘거나, scale 옵션과 맞물려 오른쪽이 잘리는 문제가 있어 직접 한 장으로 만듭니다.)
      const worker = html2pdf().set({
        margin: 0,
        filename: `${label}.pdf`,
        image: { type: 'png' },
        html2canvas: {
          scale: 2,
          useCORS: true,
          scrollX: 0,
          scrollY: 0,
          windowWidth: 1000,
        },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
      }).from(pageEl);

      // .get()은 이미 만들어진 값을 읽기만 할 뿐 직접 만들어주지 않으므로,
      // toCanvas()/toPdf()를 명시적으로 먼저 실행해야 합니다.
      await worker.toCanvas();
      const canvas = await worker.get('canvas');
      // 캡처된 내용의 가로/세로 비율을 보고 더 잘 맞는 A4 방향을 자동으로 선택
      const orientation = canvas.width >= canvas.height ? 'landscape' : 'portrait';
      worker.set({ jsPDF: { unit: 'mm', format: 'a4', orientation } });

      await worker.toPdf();
      const pdf = await worker.get('pdf');
      // 기본 파이프라인이 만든 페이지(여러 장으로 잘렸을 수 있음)는 지우고 한 장만 남깁니다.
      for (let i = pdf.internal.getNumberOfPages(); i > 1; i--) pdf.deletePage(i);
      pdf.setPage(1);

      const pageWidth = pdf.internal.pageSize.getWidth();
      const pageHeight = pdf.internal.pageSize.getHeight();
      pdf.setFillColor(255, 255, 255);
      pdf.rect(0, 0, pageWidth, pageHeight, 'F'); // 기본 배치로 그려졌던 내용을 지움

      const margin = 8; // mm, 종이 여백
      const maxW = pageWidth - margin * 2;
      const maxH = pageHeight - margin * 2;
      const ratio = Math.min(maxW / canvas.width, maxH / canvas.height);
      const imgW = canvas.width * ratio;
      const imgH = canvas.height * ratio;
      const x = (pageWidth - imgW) / 2;
      const y = (pageHeight - imgH) / 2;
      pdf.addImage(canvas.toDataURL('image/png'), 'PNG', x, y, imgW, imgH);

      await worker.save();
    } catch (e) {
      console.error(e);
      showToast('PDF 생성 실패: ' + (e && e.message ? e.message : e), true);
    } finally {
      document.body.classList.remove('pdf-export');
      pageEl.classList.remove('pdf-export');
      window.scrollTo(prevScrollX, prevScrollY);
    }
  } else {
    const prevTitle = document.title;
    document.title = label;
    window.print();
    setTimeout(() => { document.title = prevTitle; }, 500);
  }
}

function showToast(msg, isError = false) {
  const toast = document.createElement('div');
  toast.textContent = msg;
  Object.assign(toast.style, {
    position: 'fixed', bottom: '32px', right: '32px',
    background: isError ? '#eb5757' : '#37352f',
    color: '#fff', padding: '10px 18px', borderRadius: '6px',
    fontSize: '14px', zIndex: 9999,
    boxShadow: '0 4px 12px rgba(0,0,0,.15)',
    transition: 'opacity 0.3s',
  });
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity = 0; setTimeout(() => toast.remove(), 300); }, 2000);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  renderDailyTable();
  populateWeekPicker();
  renderWeek();

  TEAMS = await loadTeams();
  selectedPersonId = (await safeGet(SELECTED_KEY)) || (TEAMS[0]?.members[0]?.id ?? null);

  renderSidebar();
  await loadPersonWeek(selectedPersonId, currentWeekOffset);
  document.querySelectorAll('textarea').forEach(autoResize);
}

function autoSizeInput(el) {
  if (!el) return;
  const ruler = document.createElement('span');
  const cs = getComputedStyle(el);
  ruler.style.cssText = 'visibility:hidden;position:absolute;white-space:pre;font-size:' + cs.fontSize + ';font-weight:' + cs.fontWeight + ';font-family:' + cs.fontFamily + ';letter-spacing:' + cs.letterSpacing;
  ruler.textContent = el.value || el.placeholder || '';
  document.body.appendChild(ruler);
  el.style.width = Math.max(80, ruler.offsetWidth + 16) + 'px';
  document.body.removeChild(ruler);
}

// ══ 교수님 모드 · 코멘트 · 서명 (주간) ══
let wpProfessorMode = false;
let wpCurrentSignature = null;
function wpToggleProfMode() {
  wpProfessorMode = !wpProfessorMode;
  const btn = document.getElementById('wpProfModeBtn');
  if (btn) { btn.classList.toggle('active', wpProfessorMode); btn.textContent = wpProfessorMode ? '🎓 교수님 모드 ON' : '🎓 교수님 모드'; }
  wpApplyProfMode();
  showToast(wpProfessorMode ? '교수님 모드 ON' : '교수님 모드 OFF');
}
function wpApplyProfMode() {
  document.body.classList.toggle('prof-mode-active', wpProfessorMode);
  const banner = document.getElementById('wpProfModeBanner');
  if (banner) banner.classList.toggle('show', wpProfessorMode);
}
function wpSaveComment(key) {
  const ta = document.getElementById('wp-cta-' + key);
  if (!ta) return;
  const text = ta.value.trim();
  if (!text) return;
  wpAddCommentToList(key, text);
  ta.value = ''; ta.style.height = '44px';
  saveCurrentState(false);
}
function wpAddCommentToList(key, text) {
  const list = document.getElementById('wp-clist-' + key);
  if (!list) return;
  const item = document.createElement('div');
  item.className = 'comment-item';
  const span = document.createElement('span');
  span.className = 'comment-item-text';
  span.textContent = text;
  const btn = document.createElement('button');
  btn.className = 'comment-del-btn';
  btn.textContent = '✕';
  btn.title = '삭제';
  btn.onclick = () => {
    if (!confirm('이 코멘트를 삭제할까요?')) return;
    item.remove();
    saveCurrentState(false);
  };
  item.appendChild(span);
  item.appendChild(btn);
  list.appendChild(item);
}
function wpGetCurrentComments() {
  const r = {};
  const keys = ['instructions', ...DAYS.map(d => d.code)];
  keys.forEach(key => {
    const list = document.getElementById('wp-clist-' + key);
    r[key] = list ? Array.from(list.querySelectorAll('.comment-item-text')).map(el => el.textContent) : [];
  });
  return r;
}
let wpSigCtx = null, wpSigDrawing = false, wpSigHasContent = false, wpSigTab = 'draw';
function wpOpenSigModal() {
  document.getElementById('wp-sigOverlay').classList.add('show');
  document.getElementById('wp-sigModal').classList.add('show');
  wpInitCanvas();
  if (wpCurrentSignature && wpCurrentSignature.type === 'name') { document.getElementById('wp-sigNameInp').value = wpCurrentSignature.data || ''; wpSwitchTab('name'); }
  else wpSwitchTab('draw');
}
function wpCloseSigModal() { document.getElementById('wp-sigOverlay').classList.remove('show'); document.getElementById('wp-sigModal').classList.remove('show'); }
function wpSwitchTab(tab) {
  wpSigTab = tab;
  ['Draw','Name'].forEach(t => {
    document.getElementById('wp-tab'+t).classList.toggle('active', tab === t.toLowerCase());
    document.getElementById('wp-panel'+t).classList.toggle('active', tab === t.toLowerCase());
  });
}
function wpInitCanvas() {
  const canvas = document.getElementById('wp-sigCanvas');
  if (!canvas) return;
  wpSigCtx = canvas.getContext('2d');
  wpSigCtx.clearRect(0, 0, canvas.width, canvas.height);
  wpSigHasContent = false;
  wpSigCtx.strokeStyle = '#c0392b'; wpSigCtx.lineWidth = 3; wpSigCtx.lineCap = 'round'; wpSigCtx.lineJoin = 'round';
  function getPos(e) { const rect = canvas.getBoundingClientRect(); const sx = canvas.width/rect.width, sy = canvas.height/rect.height; const cx = e.touches ? e.touches[0].clientX : e.clientX; const cy = e.touches ? e.touches[0].clientY : e.clientY; return {x:(cx-rect.left)*sx, y:(cy-rect.top)*sy}; }
  canvas.onmousedown = canvas.ontouchstart = (e) => { e.preventDefault(); wpSigDrawing=true; wpSigHasContent=true; const p=getPos(e); wpSigCtx.beginPath(); wpSigCtx.moveTo(p.x,p.y); };
  canvas.onmousemove = canvas.ontouchmove = (e) => { e.preventDefault(); if(!wpSigDrawing)return; const p=getPos(e); wpSigCtx.lineTo(p.x,p.y); wpSigCtx.stroke(); };
  canvas.onmouseup = canvas.onmouseleave = canvas.ontouchend = () => { wpSigDrawing=false; };
}
function wpClearSig() {
  if (wpSigTab==='draw') { const c=document.getElementById('wp-sigCanvas'); if(c&&wpSigCtx){wpSigCtx.clearRect(0,0,c.width,c.height);wpSigHasContent=false;} }
  else { const i=document.getElementById('wp-sigNameInp'); if(i) i.value=''; }
}
function wpConfirmSig() {
  const today = new Date();
  const d = today.getFullYear()+'.'+String(today.getMonth()+1).padStart(2,'0')+'.'+String(today.getDate()).padStart(2,'0');
  if (wpSigTab==='draw') {
    if (!wpSigHasContent) { showToast('서명을 그려주세요.',true); return; }
    wpCurrentSignature = {type:'draw', data:document.getElementById('wp-sigCanvas').toDataURL('image/png'), date:d};
  } else {
    const name = document.getElementById('wp-sigNameInp').value.trim();
    if (!name) { showToast('성함을 입력해주세요.',true); return; }
    wpCurrentSignature = {type:'name', data:name, date:d};
  }
  wpRenderSigDisplay(); wpCloseSigModal(); saveCurrentState(false); showToast('확인 서명이 저장되었습니다 ✓');
}
function wpClearSigData() {
  if (!wpCurrentSignature) return;
  if (!confirm('서명을 삭제할까요?')) return;
  wpCurrentSignature = null; wpRenderSigDisplay(); saveCurrentState(false);
}
function wpRenderSigDisplay() {
  const el = document.getElementById('wp-sigDisplay');
  const badge = document.getElementById('wp-headerSig');
  const section = document.querySelector('.signature-section');
  if (!el) return;
  if (!wpCurrentSignature) {
    el.innerHTML = '<span class="sig-pending">서명 없음</span>';
    if (badge) badge.classList.remove('show');
    if (section) section.classList.remove('has-signature');
    return;
  }
  const sig = wpCurrentSignature;
  const stampHtml = sig.type === 'draw'
    ? `<div class="sig-stamp"><span class="stamp-confirmed">확 인</span><img src="${sig.data}" alt="서명"><span class="stamp-date">${sig.date}</span></div>`
    : `<div class="sig-stamp"><span class="stamp-confirmed">확 인</span><span class="stamp-name">${sig.data}</span><span class="stamp-date">${sig.date}</span></div>`;
  el.innerHTML = stampHtml;
  if (badge) { badge.textContent = '✓ 확인됨'; badge.classList.add('show'); }
  if (section) section.classList.add('has-signature');
}
function wpClearAll() {
  clearAll().then(() => {
    wpCurrentSignature = null;
    wpRenderSigDisplay();
    ['instructions', ...DAYS.map(d => d.code)].forEach(key => {
      const l = document.getElementById('wp-clist-' + key);
      if (l) l.innerHTML = '';
    });
  });
}

init();
</script>
