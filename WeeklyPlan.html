<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주간 계획 템플릿</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
    background: #f7f6f3;
    color: #37352f;
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  .page {
    max-width: 860px;
    margin: 0 auto;
    background: #fff;
    border-radius: 4px;
    padding: 60px 72px;
    box-shadow: rgba(15,15,15,.05) 0px 0px 0px 1px, rgba(15,15,15,.1) 0px 3px 6px;
  }

  /* Header */
  .page-title {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
    border: none;
    outline: none;
    width: 100%;
    background: transparent;
    color: #37352f;
    line-height: 1.3;
  }
  .page-title::placeholder { color: #c1bdb7; }

  .page-meta {
    display: flex;
    gap: 24px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .meta-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #787774;
  }
  .meta-label { font-weight: 500; color: #37352f; min-width: 60px; }
  .meta-input {
    border: none;
    outline: none;
    background: transparent;
    font-size: 14px;
    color: #37352f;
    font-family: inherit;
    border-bottom: 1px dashed #e3e2df;
    padding-bottom: 1px;
    min-width: 80px;
  }
  .meta-input:focus { border-bottom-color: #2eaadc; }

  .divider {
    border: none;
    border-top: 1px solid #e3e2df;
    margin: 24px 0;
  }

  /* Section headers */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #9b9a97;
    margin-bottom: 12px;
  }

  /* Daily schedule table */
  .daily-table { width: 100%; border-collapse: collapse; margin-bottom: 28px; }
  .daily-table th {
    background: #f7f6f3;
    font-size: 12px;
    font-weight: 600;
    color: #9b9a97;
    text-align: left;
    padding: 8px 12px;
    border: 1px solid #e3e2df;
  }
  .daily-table td {
    border: 1px solid #e3e2df;
    vertical-align: top;
    padding: 0;
  }
  .day-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 12px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
  }
  .day-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .day-Mon .day-dot { background: #d9730d; }
  .day-Tue .day-dot { background: #0f7b6c; }
  .day-Wed .day-dot { background: #0b6e99; }
  .day-Thu .day-dot { background: #6940a5; }
  .day-Fri .day-dot { background: #c14b8a; }

  .day-col { width: 80px; }
  .tasks-cell {
    width: 100%;
  }
  .task-list {
    padding: 8px 12px;
    min-height: 48px;
    list-style: none;
  }
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 3px 0;
    font-size: 14px;
    line-height: 1.5;
    color: #37352f;
    cursor: default;
  }
  .task-item::before {
    content: '•';
    color: #9b9a97;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .task-text {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: inherit;
    font-size: 14px;
    color: #37352f;
    line-height: 1.5;
    width: 100%;
    resize: none;
    overflow: hidden;
    min-height: 22px;
  }
  .task-text::placeholder { color: #c1bdb7; }
  .task-remove {
    background: none;
    border: none;
    cursor: pointer;
    color: #d3d0c8;
    font-size: 14px;
    line-height: 1;
    padding: 2px;
    opacity: 0;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .task-item:hover .task-remove { opacity: 1; }
  .task-remove:hover { color: #eb5757; }

  .add-task-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #c1bdb7;
    cursor: pointer;
    padding: 4px 12px 10px;
    border: none;
    background: none;
    font-family: inherit;
    transition: color 0.15s;
  }
  .add-task-btn:hover { color: #787774; }

  /* Instructions box */
  .instructions-box {
    background: #f7f6f3;
    border-radius: 4px;
    padding: 16px 20px;
    margin-bottom: 28px;
    border: 1px solid #e3e2df;
  }
  .instructions-box .section-label { margin-bottom: 10px; }
  .instructions-textarea {
    width: 100%;
    border: none;
    outline: none;
    background: transparent;
    font-family: inherit;
    font-size: 14px;
    color: #37352f;
    line-height: 1.7;
    resize: none;
    min-height: 80px;
    overflow: hidden;
  }
  .instructions-textarea::placeholder { color: #c1bdb7; }

  /* Site progress table */
  .site-table { width: 100%; border-collapse: collapse; }
  .site-table th {
    background: #f7f6f3;
    font-size: 12px;
    font-weight: 600;
    color: #9b9a97;
    text-align: left;
    padding: 8px 12px;
    border: 1px solid #e3e2df;
  }
  .site-table td {
    border: 1px solid #e3e2df;
    padding: 0;
  }
  .site-table td input {
    border: none;
    outline: none;
    background: transparent;
    font-family: inherit;
    font-size: 14px;
    color: #37352f;
    padding: 10px 12px;
    width: 100%;
  }
  .site-table td input::placeholder { color: #c1bdb7; }
  .row-num {
    color: #9b9a97;
    font-size: 13px;
    text-align: center;
    padding: 10px 8px !important;
    width: 36px;
    user-select: none;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 32px;
    justify-content: flex-end;
  }
  .btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 4px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s;
    border: none;
  }
  .btn-primary {
    background: #2eaadc;
    color: #fff;
  }
  .btn-primary:hover { background: #2499c5; }
  .btn-secondary {
    background: #f0efee;
    color: #37352f;
    border: 1px solid #e3e2df;
  }
  .btn-secondary:hover { background: #e3e2df; }

  /* Week navigator */
  .week-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }
  .week-label {
    font-size: 14px;
    color: #787774;
    font-weight: 500;
  }
  .nav-btn {
    background: none;
    border: 1px solid #e3e2df;
    border-radius: 4px;
    padding: 5px 10px;
    cursor: pointer;
    color: #787774;
    font-size: 13px;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: background 0.12s;
  }
  .nav-btn:hover { background: #f0efee; }
  .nav-group { display: flex; gap: 6px; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 12px;
    font-weight: 600;
    background: #e8f5e9;
    color: #2e7d32;
    margin-left: 8px;
    vertical-align: middle;
  }

  @media (max-width: 600px) {
    .page { padding: 32px 20px; }
    .page-title { font-size: 24px; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- Week Navigator -->
  <div class="week-nav">
    <div class="week-label" id="weekLabel">2026년 06월 4주차</div>
    <div class="nav-group">
      <button class="nav-btn" onclick="changeWeek(-1)">← 이전 주</button>
      <button class="nav-btn" onclick="changeWeek(1)">다음 주 →</button>
    </div>
  </div>

  <!-- Title -->
  <input class="page-title" id="pageTitle" value="주간 계획" placeholder="제목 없음" />

  <!-- Meta -->
  <div class="page-meta">
    <div class="meta-item">
      <span class="meta-label">소속</span>
      <input class="meta-input" id="orgInput" value="인호 공간조명연구소" style="min-width:140px;" />
    </div>
    <div class="meta-item">
      <span class="meta-label">담당자</span>
      <input class="meta-input" id="memberInput" value="BMD팀 임수연" style="min-width:100px;" />
    </div>
  </div>

  <hr class="divider">

  <!-- Daily Tasks -->
  <div class="section-label">📅 일별 업무</div>
  <table class="daily-table">
    <colgroup>
      <col class="day-col">
      <col style="width:60px">
      <col>
    </colgroup>
    <thead>
      <tr>
        <th>날짜</th>
        <th>요일</th>
        <th>업무 내용</th>
      </tr>
    </thead>
    <tbody id="dailyBody"></tbody>
  </table>

  <!-- Instructions -->
  <div class="instructions-box">
    <div class="section-label">📌 지시사항</div>
    <textarea class="instructions-textarea" id="instructionsText" placeholder="지시사항을 입력하세요..." oninput="autoResize(this)">- 미디어채널 분석자료 만들기
- 월수금 : 숏폼, 릴스 업로드
- 화 : 미디어채널 분석자료 공유 및 전원속의 내집 인스타그램 카드뉴스 발행
- 목 : 카드뉴스 업로드</textarea>
  </div>

  <!-- Site Progress -->
  <div class="section-label">🏗️ 현장 진행 현황</div>
  <table class="site-table">
    <thead>
      <tr>
        <th style="width:36px">#</th>
        <th>현장명</th>
        <th style="width:130px">건축주</th>
        <th style="width:130px">진행상황</th>
        <th>비고</th>
      </tr>
    </thead>
    <tbody id="siteBody"></tbody>
  </table>

  <!-- Actions -->
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="clearAll()">🗑 초기화</button>
    <button class="btn btn-secondary" onclick="copyToClipboard()">📋 텍스트 복사</button>
    <button class="btn btn-primary" onclick="saveData()">💾 저장</button>
  </div>

</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const DAYS = [
  { code: 'Mon', label: '월', cls: 'day-Mon' },
  { code: 'Tue', label: '화', cls: 'day-Tue' },
  { code: 'Wed', label: '수', cls: 'day-Wed' },
  { code: 'Thu', label: '목', cls: 'day-Thu' },
  { code: 'Fri', label: '금', cls: 'day-Fri' },
];

const DEFAULT_TASKS = {
  Mon: ['YT-S4-001 롱폼 편집', "'셀프 인테리어 My Home' 네이버 카페 활동", '유튜브 숏폼, 인스타 릴스 업로드 (오후 5시)'],
  Tue: ["'셀프 인테리어 My Home' 네이버 카페 활동", '미디어채널 분석자료', '전원속의 내집 인스타그램 카드뉴스 발행'],
  Wed: ['유튜브 숏폼, 인스타 릴스 업로드 (오후 5시)'],
  Thu: ['CN. 003 한국 수자원공사 수련원 카드뉴스 업로드'],
  Fri: ['유튜브 숏폼, 인스타 릴스 업로드 (오후 5시)'],
};

let currentWeekOffset = 0;

// ─── Week helpers ─────────────────────────────────────────────────────────────
function getWeekStart(offset = 0) {
  const today = new Date();
  const day = today.getDay();
  const diff = today.getDate() - day + (day === 0 ? -6 : 1);
  const mon = new Date(today.setDate(diff));
  mon.setDate(mon.getDate() + offset * 7);
  return mon;
}

function formatDate(d) {
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${mm}${dd}`;
}

function getWeekLabel(offset) {
  const mon = getWeekStart(offset);
  const year = mon.getFullYear();
  const month = mon.getMonth() + 1;
  const weekOfMonth = Math.ceil(mon.getDate() / 7);
  return `${year}년 ${String(month).padStart(2, '0')}월 ${weekOfMonth}주차`;
}

function changeWeek(dir) {
  currentWeekOffset += dir;
  renderWeek();
}

function renderWeek() {
  document.getElementById('weekLabel').textContent = getWeekLabel(currentWeekOffset);
  const mon = getWeekStart(currentWeekOffset);
  const tbody = document.getElementById('dailyBody');
  tbody.querySelectorAll('tr').forEach((tr, i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    tr.querySelector('.date-cell').textContent = formatDate(d);
  });
}

// ─── Render daily rows ────────────────────────────────────────────────────────
function renderDailyTable() {
  const tbody = document.getElementById('dailyBody');
  tbody.innerHTML = '';
  const mon = getWeekStart(currentWeekOffset);

  DAYS.forEach((day, i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <div class="day-tag ${day.cls}">
          <span class="day-dot"></span>
          <span class="date-cell">${formatDate(d)}</span>
        </div>
      </td>
      <td style="text-align:center;padding:10px 8px;font-size:13px;font-weight:600;color:#37352f;">${day.label}</td>
      <td class="tasks-cell">
        <ul class="task-list" id="tasks-${day.code}"></ul>
        <button class="add-task-btn" onclick="addTask('${day.code}')">+ 업무 추가</button>
      </td>
    `;
    tbody.appendChild(tr);

    // Populate default tasks
    const tasks = DEFAULT_TASKS[day.code] || [];
    tasks.forEach(t => addTaskItem(day.code, t));
  });
}

function addTask(dayCode, value = '') {
  addTaskItem(dayCode, value);
  const list = document.getElementById(`tasks-${dayCode}`);
  const last = list.lastElementChild;
  if (last) last.querySelector('.task-text').focus();
}

function addTaskItem(dayCode, value = '') {
  const list = document.getElementById(`tasks-${dayCode}`);
  const li = document.createElement('li');
  li.className = 'task-item';

  const ta = document.createElement('textarea');
  ta.className = 'task-text';
  ta.value = value;
  ta.placeholder = '업무 내용 입력…';
  ta.rows = 1;
  ta.oninput = () => autoResize(ta);
  ta.onkeydown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      addTask(dayCode);
    }
    if (e.key === 'Backspace' && ta.value === '') {
      e.preventDefault();
      li.remove();
    }
  };
  setTimeout(() => autoResize(ta), 0);

  const btn = document.createElement('button');
  btn.className = 'task-remove';
  btn.innerHTML = '✕';
  btn.onclick = () => li.remove();

  li.appendChild(ta);
  li.appendChild(btn);
  list.appendChild(li);
}

// ─── Site progress ─────────────────────────────────────────────────────────────
function renderSiteTable() {
  const tbody = document.getElementById('siteBody');
  tbody.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="row-num">${i}</td>
      <td><input placeholder="현장명"></td>
      <td><input placeholder="건축주"></td>
      <td><input placeholder="진행상황"></td>
      <td><input placeholder="비고"></td>
    `;
    tbody.appendChild(tr);
  }
}

// ─── Utilities ─────────────────────────────────────────────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function clearAll() {
  if (!confirm('모든 내용을 초기화할까요?')) return;
  DAYS.forEach(d => {
    document.getElementById(`tasks-${d.code}`).innerHTML = '';
  });
  document.getElementById('instructionsText').value = '';
  renderSiteTable();
}

function saveData() {
  // Collect data and store in localStorage
  const data = {
    week: getWeekLabel(currentWeekOffset),
    org: document.getElementById('orgInput').value,
    member: document.getElementById('memberInput').value,
    tasks: {},
    instructions: document.getElementById('instructionsText').value,
    sites: [],
  };
  DAYS.forEach(d => {
    data.tasks[d.code] = [...document.querySelectorAll(`#tasks-${d.code} .task-text`)].map(t => t.value).filter(Boolean);
  });
  document.querySelectorAll('#siteBody tr').forEach(tr => {
    const inputs = tr.querySelectorAll('input');
    data.sites.push({ name: inputs[0]?.value, client: inputs[1]?.value, status: inputs[2]?.value, note: inputs[3]?.value });
  });
  try {
    localStorage.setItem('weeklyPlan_' + currentWeekOffset, JSON.stringify(data));
    showToast('저장되었습니다 ✓');
  } catch(e) {
    showToast('저장 실패: ' + e.message, true);
  }
}

function copyToClipboard() {
  const week = getWeekLabel(currentWeekOffset);
  const org = document.getElementById('orgInput').value;
  const member = document.getElementById('memberInput').value;
  let text = `[주간 계획] ${week}\n${org} / ${member}\n\n`;

  DAYS.forEach((d, i) => {
    const mon = getWeekStart(currentWeekOffset);
    const dt = new Date(mon);
    dt.setDate(mon.getDate() + i);
    const tasks = [...document.querySelectorAll(`#tasks-${d.code} .task-text`)].map(t => t.value).filter(Boolean);
    text += `[${formatDate(dt)} ${d.label}]\n`;
    tasks.forEach(t => { text += `  • ${t}\n`; });
    text += '\n';
  });

  const instr = document.getElementById('instructionsText').value;
  if (instr) text += `[지시사항]\n${instr}\n\n`;

  const siteRows = [...document.querySelectorAll('#siteBody tr')];
  const hasSite = siteRows.some(tr => [...tr.querySelectorAll('input')].some(i => i.value));
  if (hasSite) {
    text += `[현장 진행 현황]\n`;
    siteRows.forEach((tr, idx) => {
      const inputs = tr.querySelectorAll('input');
      const vals = [...inputs].map(i => i.value);
      if (vals.some(Boolean)) {
        text += `  ${idx+1}. ${vals[0]} | ${vals[1]} | ${vals[2]} | ${vals[3]}\n`;
      }
    });
  }

  navigator.clipboard.writeText(text).then(() => showToast('클립보드에 복사되었습니다 ✓'));
}

function showToast(msg, isError = false) {
  const toast = document.createElement('div');
  toast.textContent = msg;
  Object.assign(toast.style, {
    position: 'fixed', bottom: '32px', right: '32px',
    background: isError ? '#eb5757' : '#37352f',
    color: '#fff', padding: '10px 18px', borderRadius: '6px',
    fontSize: '14px', zIndex: 9999,
    boxShadow: '0 4px 12px rgba(0,0,0,.15)',
    transition: 'opacity 0.3s',
  });
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity = 0; setTimeout(() => toast.remove(), 300); }, 2000);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
renderDailyTable();
renderSiteTable();
renderWeek();

// Auto-resize all textareas on load
document.querySelectorAll('textarea').forEach(autoResize);
</script>
</body>
</html>
