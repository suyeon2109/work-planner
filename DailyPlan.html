<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 / 연구 일지 — BMD팀</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --sidebar-bg: #f7f7f5;
    --border: #e8e8e5;
    --text: #37352f;
    --text-muted: #9b9a97;
    --text-light: #b7b6b3;
    --accent: #2f80ed;
    --accent-hover: #1a6fd4;
    --tag-bg: #e8f0fe;
    --tag-text: #2f80ed;
    --row-hover: #f7f7f5;
    --danger: #eb5757;
    --success: #0f7b6c;
    --font: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 240px;
    min-width: 240px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 16px 14px 10px;
    border-bottom: 1px solid var(--border);
  }

  .workspace-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .workspace-icon {
    width: 22px; height: 22px;
    background: var(--accent);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-size: 11px;
    font-weight: 700;
  }

  .sidebar-section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 14px 14px 6px;
  }

  .sidebar-items {
    flex: 1;
    overflow-y: auto;
    padding: 0 6px 12px;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13.5px;
    color: var(--text);
    transition: background 0.1s;
    user-select: none;
  }

  .sidebar-item:hover { background: rgba(0,0,0,0.05); }
  .sidebar-item.active { background: rgba(0,0,0,0.07); font-weight: 500; }
  .sidebar-item .icon { font-size: 15px; width: 20px; text-align: center; }
  .sidebar-item .date-label { font-size: 11px; color: var(--text-muted); margin-left: auto; }

  .sidebar-new-btn {
    margin: 8px 10px 0;
    padding: 7px 12px;
    border-radius: 6px;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap-6px; justify-content: center;
    gap: 6px;
    font-family: var(--font);
    transition: background 0.15s;
  }

  .sidebar-new-btn:hover { background: var(--accent-hover); }

  /* ── Main ── */
  .main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    padding: 14px 56px 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: sticky;
    top: 0;
    background: white;
    z-index: 10;
  }

  .page-breadcrumb {
    font-size: 13px;
    color: var(--text-muted);
    display: flex; align-items: center; gap: 6px;
  }
  .page-breadcrumb b { color: var(--text); font-weight: 500; }

  .topbar-actions { display: flex; gap: 8px; }

  .btn-ghost {
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    font-size: 13px;
    cursor: pointer;
    font-family: var(--font);
    color: var(--text);
    transition: background 0.1s;
  }
  .btn-ghost:hover { background: var(--row-hover); }

  .btn-primary {
    padding: 5px 14px;
    border: none;
    border-radius: 6px;
    background: var(--accent);
    color: white;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--accent-hover); }

  /* ── Page content ── */
  .page-content {
    padding: 40px 56px 80px;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
  }

  .page-title-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  .page-emoji { font-size: 36px; }

  .page-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    border: none;
    outline: none;
    background: transparent;
    font-family: var(--font);
    width: 100%;
    padding: 2px 0;
  }

  .page-meta {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 28px;
    padding-top: 4px;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }

  .meta-label { color: var(--text-muted); width: 70px; }

  .meta-value {
    color: var(--text);
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--font);
    font-size: 13px;
    cursor: text;
    padding: 2px 6px;
    border-radius: 4px;
    transition: background 0.1s;
  }
  .meta-value:hover, .meta-value:focus { background: var(--row-hover); }

  /* SNS 현황 */
  .sns-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .sns-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 12.5px;
    font-weight: 500;
  }

  .sns-tag.youtube { background: #fff0f0; color: #c0392b; }
  .sns-tag.instagram { background: #fff4f9; color: #c2185b; }
  .sns-tag.blog { background: #f0f4ff; color: #3a57e8; }

  .sns-tag input {
    background: transparent;
    border: none;
    outline: none;
    font-size: 12.5px;
    font-family: var(--font);
    color: inherit;
    width: 70px;
    font-weight: 600;
  }

  /* ── Table ── */
  .section-label {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
    margin-top: 28px;
  }

  .journal-table {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .table-row {
    display: grid;
    grid-template-columns: 160px 1fr 140px;
    border-bottom: 1px solid var(--border);
    min-height: 44px;
    transition: background 0.1s;
  }
  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: var(--row-hover); }

  .table-row.header-row {
    background: var(--sidebar-bg);
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }
  .table-row.header-row:hover { background: var(--sidebar-bg); }

  .table-cell {
    padding: 10px 14px;
    border-right: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
  }
  .table-cell:last-child { border-right: none; }

  .cell-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    padding-top: 1px;
  }

  .cell-input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--font);
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.6;
    resize: none;
    min-height: 24px;
    padding: 0;
  }

  .cell-input::placeholder { color: var(--text-light); }

  .cell-input-small {
    font-size: 12.5px;
    color: var(--text-muted);
  }

  /* ── Notice bar ── */
  .notice-bar {
    margin-top: 28px;
    padding: 12px 16px;
    background: #fffbf0;
    border: 1px solid #f0e0a0;
    border-radius: 8px;
    font-size: 12.5px;
    color: #7a6000;
    line-height: 1.7;
  }

  .notice-bar strong { font-weight: 600; }

  /* ── Divider ── */
  .divider { height: 1px; background: var(--border); margin: 24px 0; }

  /* Checklist items in cell */
  .checklist { list-style: none; padding: 0; }
  .check-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 2px 0;
    font-size: 13.5px;
    line-height: 1.6;
  }
  .check-item input[type="checkbox"] {
    margin-top: 3px; flex-shrink: 0;
    width: 14px; height: 14px;
    cursor: pointer;
    accent-color: var(--accent);
  }
  .check-item span { flex: 1; }
  .check-item span.done { text-decoration: line-through; color: var(--text-muted); }

  /* Tag in 비고 */
  .stat-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
    background: var(--tag-bg);
    color: var(--tag-text);
    margin: 2px 2px 2px 0;
    white-space: nowrap;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .big-emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- ════════════ SIDEBAR ════════════ -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="workspace-name">
      <div class="workspace-icon">B</div>
      BMD팀 — 임수연PD
    </div>
  </div>

  <button class="sidebar-new-btn" onclick="newEntry()">＋ 새 일지 작성</button>

  <div class="sidebar-section-title">최근 일지</div>

  <div class="sidebar-items" id="sidebarList">
    <!-- JS 렌더링 -->
  </div>
</aside>

<!-- ════════════ MAIN ════════════ -->
<main class="main">
  <div class="topbar">
    <div class="page-breadcrumb">
      📋 업무일지 &rsaquo; <b id="topDate">—</b>
    </div>
    <div class="topbar-actions">
      <button class="btn-ghost" onclick="deleteEntry()">🗑 삭제</button>
      <button class="btn-primary" onclick="saveEntry()">저장</button>
    </div>
  </div>

  <div class="page-content" id="pageContent">
    <div class="empty-state">
      <div class="big-emoji">📄</div>
      <p>왼쪽에서 일지를 선택하거나<br>새 일지를 작성하세요.</p>
    </div>
  </div>
</main>

<script>
// ══════════════════════════════════════
//  State
// ══════════════════════════════════════
let entries = [];        // [{id, date, day, data}]
let currentId = null;

const DAY_KO = ['일','월','화','수','목','금','토'];

function todayStr() {
  const d = new Date();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${String(d.getFullYear()).slice(2)}${mm}${dd}`;
}

function todayDisplay(id) {
  const y = '20'+id.slice(0,2);
  const m = id.slice(2,4);
  const d = id.slice(4,6);
  const day = DAY_KO[new Date(+y, +m-1, +d).getDay()];
  return `${y}.${m}.${d} (${day})`;
}

function dayOfWeek(id) {
  const y = '20'+id.slice(0,2), m = id.slice(2,4), d = id.slice(4,6);
  return DAY_KO[new Date(+y, +m-1, +d).getDay()];
}

// ══════════════════════════════════════
//  Storage
// ══════════════════════════════════════
async function load() {
  try {
    const r = await window.storage.get('bmd_entries');
    if (r) entries = JSON.parse(r.value);
  } catch(_) { entries = []; }
  // 샘플 데이터 (첫 로드)
  if (entries.length === 0) {
    entries = [{
      id: '260619',
      data: {
        manager: '임수연PD',
        yt: '20,526', yt_sub: '215',
        ig: '5,519',  ig_sub: '829',
        blog: '',     blog_sub: '',
        directive: '차주 카드뉴스 : 한국 수자원공사 K-Water 수련원\n명함 디자인\n네이버 플레이스 등록',
        directive_note: '',
        tasks: '【업무회의】\n1. 전원속의 내집 카드뉴스로(화요일 발행)\n2. 전문성을 매출로 연결하기 → 카드뉴스 해시태그에 두꺼비프로젝트, 헌집을새집으로 두개 추가하기\n3. 셀인카페 활동을 우선순위로\n\n- YT-S4-001 롱폼 편집 → 진행률 : 10%\n- 회사 도메인 이메일 생성(네이버 웍스) 및 호스팅 변경 완료\n- 영상 055-5 유튜브, 인스타그램 업로드\n- 홈페이지 전원속의 내집 업로드\n- 홈페이지 안심번호 수정, 로고 수정\n- 블로그 로고 수정',
        tasks_note: '',
        tomorrow: '- YT-S4-001 롱폼 편집',
        tomorrow_note: '',
        pending: '',
        pending_note: '',
      }
    }];
    await save();
  }
  renderSidebar();
  if (entries.length) selectEntry(entries[0].id);
}

async function save() {
  try {
    await window.storage.set('bmd_entries', JSON.stringify(entries));
  } catch(e) { console.error(e); }
}

// ══════════════════════════════════════
//  Sidebar
// ══════════════════════════════════════
function renderSidebar() {
  const el = document.getElementById('sidebarList');
  if (!entries.length) { el.innerHTML = '<div style="padding:10px 8px;font-size:13px;color:var(--text-muted)">일지가 없습니다</div>'; return; }
  const sorted = [...entries].sort((a,b)=>b.id.localeCompare(a.id));
  el.innerHTML = sorted.map(e => {
    const active = e.id === currentId ? ' active' : '';
    const disp = todayDisplay(e.id);
    return `<div class="sidebar-item${active}" onclick="selectEntry('${e.id}')">
      <span class="icon">📝</span>
      <span>${disp.slice(0,10)}</span>
      <span class="date-label">${dayOfWeek(e.id)}</span>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════
//  New / Select / Delete
// ══════════════════════════════════════
function newEntry() {
  const id = todayStr();
  if (entries.find(e=>e.id===id)) { selectEntry(id); return; }
  entries.push({ id, data: {
    manager:'임수연PD',
    yt:'',yt_sub:'',ig:'',ig_sub:'',blog:'',blog_sub:'',
    directive:'',directive_note:'',
    tasks:'',tasks_note:'',
    tomorrow:'',tomorrow_note:'',
    pending:'',pending_note:''
  }});
  save();
  renderSidebar();
  selectEntry(id);
}

function selectEntry(id) {
  currentId = id;
  renderSidebar();
  const entry = entries.find(e=>e.id===id);
  if (!entry) return;
  document.getElementById('topDate').textContent = todayDisplay(id);
  renderPage(entry);
}

function deleteEntry() {
  if (!currentId) return;
  if (!confirm('이 일지를 삭제할까요?')) return;
  entries = entries.filter(e=>e.id!==currentId);
  currentId = null;
  save();
  renderSidebar();
  document.getElementById('topDate').textContent = '—';
  document.getElementById('pageContent').innerHTML = `
    <div class="empty-state">
      <div class="big-emoji">📄</div>
      <p>왼쪽에서 일지를 선택하거나<br>새 일지를 작성하세요.</p>
    </div>`;
  if (entries.length) selectEntry(entries[0].id);
}

// ══════════════════════════════════════
//  Render page
// ══════════════════════════════════════
function renderPage(entry) {
  const d = entry.data;
  const disp = todayDisplay(entry.id);
  document.getElementById('pageContent').innerHTML = `
    <div class="page-title-row">
      <span class="page-emoji">📋</span>
      <input class="page-title" id="f_title" value="업무 / 연구 일지" placeholder="제목">
    </div>

    <div class="page-meta">
      <div class="meta-item">
        <span class="meta-label">날짜</span>
        <span class="meta-value">${disp}</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">담당자</span>
        <input class="meta-value" id="f_manager" value="${esc(d.manager||'임수연PD')}" placeholder="담당자">
      </div>
      <div class="meta-item">
        <span class="meta-label">팀</span>
        <span class="meta-value">2026 BMD팀</span>
      </div>
    </div>

    <!-- SNS 현황 -->
    <div class="section-label">SNS 현황 (팔로워 / 최근 영상 시청자수)</div>
    <div class="sns-bar">
      <div class="sns-tag youtube">
        ▶ YouTube &nbsp;
        <input id="f_yt" value="${esc(d.yt)}" placeholder="0" title="팔로워">
        <span style="color:rgba(0,0,0,.3)"> / </span>
        <input id="f_yt_sub" value="${esc(d.yt_sub)}" placeholder="0" title="최근 시청자수">
      </div>
      <div class="sns-tag instagram">
        📷 Instagram &nbsp;
        <input id="f_ig" value="${esc(d.ig)}" placeholder="0">
        <span style="color:rgba(0,0,0,.3)"> / </span>
        <input id="f_ig_sub" value="${esc(d.ig_sub)}" placeholder="0">
      </div>
      <div class="sns-tag blog">
        ✏️ Blog &nbsp;
        <input id="f_blog" value="${esc(d.blog)}" placeholder="0">
        <span style="color:rgba(0,0,0,.3)"> / </span>
        <input id="f_blog_sub" value="${esc(d.blog_sub)}" placeholder="0">
      </div>
    </div>

    <!-- 본문 테이블 -->
    <div class="section-label">일지</div>
    <div class="journal-table">
      <!-- 헤더 -->
      <div class="table-row header-row">
        <div class="table-cell" style="font-size:11px">구분</div>
        <div class="table-cell" style="font-size:11px">내 용</div>
        <div class="table-cell" style="font-size:11px">비 고</div>
      </div>

      <!-- 교수님 지시사항 -->
      <div class="table-row">
        <div class="table-cell"><span class="cell-label">교수님<br>지시사항</span></div>
        <div class="table-cell"><textarea class="cell-input" id="f_directive" rows="3" placeholder="지시사항을 입력하세요...">${esc(d.directive)}</textarea></div>
        <div class="table-cell"><textarea class="cell-input cell-input-small" id="f_directive_note" rows="3" placeholder="비고...">${esc(d.directive_note)}</textarea></div>
      </div>

      <!-- 금일 진행 업무 -->
      <div class="table-row">
        <div class="table-cell"><span class="cell-label">금일<br>진행 업무</span></div>
        <div class="table-cell"><textarea class="cell-input" id="f_tasks" rows="8" placeholder="오늘 진행한 업무를 입력하세요...">${esc(d.tasks)}</textarea></div>
        <div class="table-cell"><textarea class="cell-input cell-input-small" id="f_tasks_note" rows="8" placeholder="비고...">${esc(d.tasks_note)}</textarea></div>
      </div>

      <!-- 익일 업무 -->
      <div class="table-row">
        <div class="table-cell"><span class="cell-label">익일 업무</span></div>
        <div class="table-cell"><textarea class="cell-input" id="f_tomorrow" rows="3" placeholder="내일 예정된 업무...">${esc(d.tomorrow)}</textarea></div>
        <div class="table-cell"><textarea class="cell-input cell-input-small" id="f_tomorrow_note" rows="3" placeholder="비고...">${esc(d.tomorrow_note)}</textarea></div>
      </div>

      <!-- 미진행 업무 -->
      <div class="table-row">
        <div class="table-cell"><span class="cell-label">미진행<br>업무</span></div>
        <div class="table-cell"><textarea class="cell-input" id="f_pending" rows="2" placeholder="미처 진행하지 못한 업무...">${esc(d.pending)}</textarea></div>
        <div class="table-cell"><textarea class="cell-input cell-input-small" id="f_pending_note" rows="2" placeholder="비고...">${esc(d.pending_note)}</textarea></div>
      </div>
    </div>

    <!-- 공지 -->
    <div class="notice-bar">
      📢 <strong>공유 안내</strong> &nbsp;|&nbsp; 일지 <strong>18시</strong> 연구소 단톡방 공유 &nbsp;·&nbsp; 주간일정 매주 <strong>금요일 14시</strong>까지 공유 &nbsp;·&nbsp; 매주 <strong>월요일</strong> 일지 점검<br>
      📌 <strong>필수 입력사항</strong> : 회의내용 · 제품 입출고 내역 · 메일발송 · 고객 클레임
    </div>

    <div class="divider"></div>
    <div style="font-size:12px;color:var(--text-muted);text-align:right">차인호 공간조명연구소</div>
  `;

  // auto-resize textareas
  document.querySelectorAll('.cell-input').forEach(ta => {
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    });
    ta.style.height = ta.scrollHeight + 'px';
  });
}

// ══════════════════════════════════════
//  Save
// ══════════════════════════════════════
function saveEntry() {
  if (!currentId) return;
  const entry = entries.find(e=>e.id===currentId);
  if (!entry) return;
  const g = id => document.getElementById(id)?.value || '';
  entry.data = {
    manager: g('f_manager'),
    yt: g('f_yt'), yt_sub: g('f_yt_sub'),
    ig: g('f_ig'), ig_sub: g('f_ig_sub'),
    blog: g('f_blog'), blog_sub: g('f_blog_sub'),
    directive: g('f_directive'), directive_note: g('f_directive_note'),
    tasks: g('f_tasks'), tasks_note: g('f_tasks_note'),
    tomorrow: g('f_tomorrow'), tomorrow_note: g('f_tomorrow_note'),
    pending: g('f_pending'), pending_note: g('f_pending_note'),
  };
  save();
  // 저장 피드백
  const btn = document.querySelector('.btn-primary');
  btn.textContent = '✓ 저장됨';
  btn.style.background = '#0f7b6c';
  setTimeout(()=>{ btn.textContent='저장'; btn.style.background=''; }, 1800);
}

function esc(s='') { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ══════════════════════════════════════
//  Init
// ══════════════════════════════════════
load();
</script>
